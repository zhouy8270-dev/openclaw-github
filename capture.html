#typeLegend.landscape{

/* ── TYPE LEGEND (small, orientation-aware) ── */
#typeLegend{position:absolute;z-index:20;}

.legend-item{display:flex;align-items:center;justify-content:center;gap:3px;font-size:12px;color:rgba(255,255,255,0.9);white-space:nowrap;padding:2px 0;}

/* ── BOTTOM CONTROLS ── */
.hud-bottom{position:absolute;bottom:0;left:0;right:0;z-index:20;padding:16px 20px 28px;background:linear-gradient(transparent,rgba(0,0,0,0.65));display:flex;flex-direction:column;align-items:center;gap:12px;}
.quality-tip{font-size:11px;color:rgba(255,255,255,0.6);text-align:center;letter-spacing:0.3px;}
.shutter-row{display:flex;align-items:center;justify-content:center;gap:32px;width:100%;}
.gallery-corner{position:fixed;bottom:28px;left:16px;z-index:25;width:52px;height:52px;border-radius:10px;overflow:hidden;border:2px solid rgba(255,255,255,0.4);background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;}
.gallery-corner img{width:100%;height:100%;object-fit:cover;display:none;}
.gallery-btn{width:52px;height:52px;border-radius:12px;overflow:hidden;border:2px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:22px;}
#galleryThumb{width:100%;height:100%;object-fit:cover;display:none;}

/* Shutter button */
.shutter-wrap{position:relative;display:flex;align-items:center;justify-content:center;}
.shutter-btn{width:76px;height:76px;border-radius:50%;background:#fff;border:4px solid rgba(255,255,255,0.4);cursor:pointer;position:relative;transition:transform 0.1s;display:flex;align-items:center;justify-content:center;}
.shutter-btn:active{transform:scale(0.92);}
.shutter-inner{width:62px;height:62px;border-radius:50%;background:#fff;transition:all 0.15s;}
.shutter-btn.recording .shutter-inner{border-radius:8px;width:28px;height:28px;background:#ef4444;}
.rec-ring{position:absolute;inset:-6px;border-radius:50%;border:3px solid #ef4444;opacity:0;animation:none;}
.shutter-btn.recording .rec-ring{opacity:1;animation:pulse-ring 1s infinite;}
@keyframes pulse-ring{0%{transform:scale(1);opacity:0.8}100%{transform:scale(1.15);opacity:0}}
.rec-timer{position:absolute;top:-28px;left:50%;transform:translateX(-50%);font-size:13px;font-weight:700;color:#ef4444;background:rgba(0,0,0,0.6);padding:3px 10px;border-radius:10px;display:none;white-space:nowrap;}
.shutter-btn.recording ~ .rec-timer, .shutter-btn.recording + .rec-timer{display:block;}
.voice-btn{width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,0.15);border:2px solid rgba(255,255,255,0.3);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:20px;}
.voice-btn-label{font-size:9px;color:rgba(255,255,255,0.7);}

/* ── TYPE SELECT MODAL ── */
#typeModal{position:fixed;inset:0;z-index:100;display:none;align-items:flex-end;background:rgba(0,0,0,0.65);backdrop-filter:blur(6px);}
#typeModal.open{display:flex;}
.type-modal-box{width:100%;background:#16213e;border-radius:22px 22px 0 0;padding:16px 14px 32px;animation:slideUp 0.22s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

/* Header: thumb + title */
.type-modal-hd{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.pending-thumb{width:56px;height:56px;border-radius:10px;object-fit:cover;background:rgba(255,255,255,0.08);flex-shrink:0;}
.type-modal-title{font-size:16px;font-weight:700;color:#fff;margin-bottom:3px;}
.type-modal-sub{font-size:12px;color:rgba(255,255,255,0.45);}

/* Type grid */
.type-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-bottom:16px;}
.type-cell{padding:10px 4px 8px;border-radius:12px;background:rgba(255,255,255,0.07);border:2px solid transparent;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:all 0.15s;-webkit-tap-highlight-color:transparent;active:scale(0.95);}
.type-cell.selected{border-color:currentColor;background:rgba(255,255,255,0.15);}
.tc-icon{font-size:26px;}
.tc-label{font-size:12px;font-weight:700;color:#fff;}
.tc-count{font-size:10px;color:rgba(255,255,255,0.45);}

/* Footer: skip | voice | confirm */
.type-modal-footer{display:flex;align-items:center;gap:10px;}
.type-skip-btn{padding:12px 14px;border-radius:12px;background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.5);border:none;font-size:13px;cursor:pointer;font-family:inherit;flex:1;}
.type-voice-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;}
.type-voice-circle{width:64px;height:64px;border-radius:50%;background:rgba(239,68,68,0.15);border:3px solid rgba(239,68,68,0.5);color:#fff;font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;transition:all 0.15s;}
.type-voice-circle.recording{background:rgba(239,68,68,0.4);border-color:#ef4444;transform:scale(1.05);}
.type-voice-label{font-size:10px;color:rgba(255,255,255,0.4);}
.type-confirm-btn{padding:12px 14px;border-radius:12px;background:linear-gradient(135deg,#1d4ed8,#4f46e5);color:#fff;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;flex:1.5;transition:opacity 0.15s;}
.type-confirm-btn:disabled{opacity:0.3;}
.type-voice-btn{display:none;}/* hide old */

/* ── GALLERY PANEL
/* ── GALLERY PANEL ── */
#galleryPanel{position:fixed;inset:0;z-index:90;background:#0a0a14;display:none;flex-direction:column;}
#galleryPanel.open{display:flex;}
.gp-head{padding:16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,0.08);}

.gp-grid{flex:1;overflow-y:auto;padding:12px;display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.gp-item{aspect-ratio:1;border-radius:8px;overflow:hidden;position:relative;background:rgba(255,255,255,0.05);}
.gp-item img,.gp-item video{width:100%;height:100%;object-fit:cover;}
.gp-item-tags{position:absolute;bottom:0;left:0;right:0;padding:3px 5px;background:linear-gradient(transparent,rgba(0,0,0,0.7));font-size:9px;color:rgba(255,255,255,0.8);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.gp-item-del{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,0.6);border:none;color:#fff;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.gp-footer{padding:16px;border-top:1px solid rgba(255,255,255,0.08);}
.gp-sync-btn{width:100%;padding:13px;border-radius:12px;background:linear-gradient(135deg,#059669,#0284c7);color:#fff;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}

/* notif */
.notif{position:fixed;bottom:120px;left:50%;transform:translateX(-50%) translateY(6px);background:rgba(30,30,50,0.95);color:#fff;padding:9px 18px;border-radius:12px;font-size:13px;font-weight:500;opacity:0;transition:all 0.2s;z-index:300;white-space:nowrap;}
.notif.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media (orientation:landscape){
  #typeLegend{flex-direction:column!important;top:50%!important;right:6px!important;left:auto!important;transform:translateY(-50%)!important;width:auto!important;}
  .hud-bottom{padding:10px 20px 16px;}
  .shutter-btn{width:64px;height:64px;}
  .shutter-inner{width:52px;height:52px;}
}
#videoConfirmModal.open{display:flex!important;}
#videoConfirmModal.open{display:flex!important;}

  </button>

  </div>
</div>

<!-- ── MAIN APP ── -->
<div id="app">
  <video id="video" autoplay muted playsinline></video>
  <div id="flash"></div>

  <!-- HUD TOP -->
  <div class="hud-top">
    <div class="hud-pill">
      <div class="gps-dot" id="gpsDot"></div>
      <span id="gpsText">定位中…</span>

    <div class="shutter-row">
      <div class="shutter-wrap">
        <div class="rec-ring"></div>
        <div class="shutter-btn" id="shutterBtn"
          ontouchstart="onShutterDown(event)" ontouchend="onShutterUp(event)"
          onmousedown="onShutterDown(event)" onmouseup="onShutterUp(event)">
          <div class="shutter-inner"></div>
        </div>
        <div class="rec-timer" id="recTimer">⏺ 0s</div>
      </div>
    </div>

    <img id="galleryThumb" style="display:none;width:100%;height:100%;object-fit:cover;">
  </div>
  <!-- Gallery shortcut bottom-left -->

        </button>

      </div>

<div id="videoConfirmModal" style="position:fixed;inset:0;z-index:110;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.75);">

    <div style="font-size:44px;margin-bottom:12px;">🎥</div>
    <div style="font-size:17px;font-weight:700;color:#fff;margin-bottom:6px;">录像完成</div>
    <div style="font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:24px;">时长 <span id="vcDuration" style="color:#fbbf24;font-weight:700;"></span>，是否保留？</div>

<div id="galleryPanel">
  <div class="gp-head">
    <div class="gp-title">已拍摄 <span id="gpCount">0</span> 张</div>
    <button class="gp-close" onclick="closeGallery()">✕</button>
  </div>
  <div class="gp-grid" id="gpGrid"></div>

<script>
// Attach button after DOM ready
document.addEventListener('DOMContentLoaded', function() {
  var btn = document.getElementById('startBtn');
  if (btn) btn.addEventListener('click', function() { startApp(); });
});

// ══════════════════════
// CONFIG
// ══════════════════════
const PHOTO_TOTAL_MAX = 60;
const VIDEO_MAX_SECS  = 20;
const TYPE_TIMEOUT    = 10000;

const PHOTO_CATS = [
  { key:'道路', icon:'🛣',  color:'#f59e0b' },
  { key:'宅间', icon:'🏠',  color:'#10b981' },
  { key:'停车', icon:'🚗',  color:'#ef4444' },
  { key:'场地', icon:'⛺',  color:'#8b5cf6' },
  { key:'绿化', icon:'🌿',  color:'#059669' },
  { key:'建筑', icon:'🏘',  color:'#7c3aed' },
  { key:'全景', icon:'🌅',  color:'#0284c7' },
  { key:'设施', icon:'🔧',  color:'#dc2626' },
  { key:'活动', icon:'🎭',  color:'#db2777' },
  { key:'其他', icon:'📌',  color:'#64748b' },
];

// ══════════════════════
// STATE
// ══════════════════════
let items = [];
let gpsCoord = null;
let gpsAddr = '';
let camStream = null;
let mediaRecorder = null;
let recChunks = [];
let recTimer = null;
let recSecs = 0;
let isRecording = false;
let shutterTimer = null;
let shutterDown = false;
let pendingPhotoItem = null;
let typeCountdownTimer = null;
let selectedTypes = [];
let voiceChunks = [];
let voiceRecorder = null;

// ══════════════════════
// PERMISSION + INIT
// ══════════════════════
async function requestPerms() {
  startApp();
}

async function startApp() {
  // Show warning if on file:// protocol
  if (location.protocol === 'file:') {
    document.getElementById('httpsWarn').style.display = 'block';
    // Still try to proceed
  }
  document.getElementById('permScreen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  // Camera will trigger browser permission dialog automatically
  await startCamera();
  startGPSWatch();
  renderLegend();
  updateCountUI();
  checkOrientation();
}

async function startCamera() {
  try {
    // Request both video and audio for synchronized recording
    camStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: {ideal:1920}, height: {ideal:1080} },
      audio: true
    });
    const videoEl = document.getElementById('video');
    videoEl.srcObject = camStream;
    videoEl.muted = true; // Mute playback to avoid echo, audio still captured in stream
  } catch(e) {
    // Fallback: try without audio
    try {
      camStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: {ideal:1920}, height: {ideal:1080} },
        audio: false
      });
      document.getElementById('video').srcObject = camStream;
      notify('提示：麦克风不可用，录像无声音');
    } catch(e2) {
      // Check if it's HTTPS issue
      if (location.protocol === 'file:' || location.protocol === 'http:') {
        var tip = document.createElement('div');
        tip.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:rgba(220,38,38,0.9);color:#fff;padding:12px 16px;font-size:12px;text-align:center;z-index:999;line-height:1.7;';
        tip.innerHTML = '⚠️ 需通过 HTTPS 或 localhost 访问才能使用摄像头<br>建议将文件部署到服务器后访问<br><small>测试地址：http://localhost:3001/capture.html</small>';
        document.body.appendChild(tip);
      } else {
        notify('摄像头启动失败：' + e2.message);
      }
    }
  }
}

// ══════════════════════
// ORIENTATION
// ══════════════════════
function checkOrientation() {
  const legend = document.getElementById('typeLegend');
  const isLandscape = window.innerWidth > window.innerHeight;
  legend.className = isLandscape ? 'landscape' : 'portrait';
}
window.addEventListener('resize', checkOrientation);

// ══════════════════════
// TYPE LEGEND (small)
// ══════════════════════
function renderLegend() {
  var el = document.getElementById('typeLegend');
  el.innerHTML = PHOTO_CATS.map(function(cat) {
    var cnt = items.filter(function(i){return i.cats && i.cats.includes(cat.key);}).length;
    return '<div class="legend-item">'
      + '<span class="li-icon">' + cat.icon + '</span>'
      + '<span class="li-key">' + cat.key + '</span>'
      + '<span class="li-count">' + cnt + '</span>'
      + '</div>';
  }).join('');
}

// ══════════════════════
// COUNT UI
// ══════════════════════
function updateCountUI() {
  const total = items.filter(i => i.type === 'photo').length;
  document.getElementById('countNum').textContent = total;
  // Update gallery thumb
  const photos = items.filter(i => i.type === 'photo');
  const thumb = document.getElementById('galleryThumb');
  const icon = document.getElementById('galleryIcon');
  if (photos.length > 0) {
    thumb.src = photos[0].url;
    thumb.style.display = 'block';
    icon.style.display = 'none';
  }
  document.getElementById('gpCount').textContent = total;
  renderLegend();
}

// ══════════════════════
// SHUTTER (short=photo, long=video)
// ══════════════════════
function onShutterDown(e) {
  e.preventDefault();
  shutterDown = true;
  shutterTimer = setTimeout(() => {
    if (shutterDown) toggleRecord();
  }, 500);
}

function onShutterUp(e) {
  e.preventDefault();
  clearTimeout(shutterTimer);
  if (shutterDown && !isRecording) {
    shutterDown = false;
    takePhoto();
  } else {
    shutterDown = false;
    if (isRecording) stopRecord();
  }
}

// ══════════════════════
// TAKE PHOTO
// ══════════════════════
function takePhoto() {
  const video = document.getElementById('video');
  if (!video.srcObject) { notify('摄像头未启动'); return; }
  if (items.filter(i=>i.type==='photo').length >= PHOTO_TOTAL_MAX) {
    notify('⚠️ 已达 ' + PHOTO_TOTAL_MAX + ' 张上限'); return;
  }

  // Flash
  const f = document.getElementById('flash');
  f.style.opacity = 1;
  setTimeout(() => f.style.opacity = 0, 80);

  const canvas = document.createElement('canvas');
  canvas.width = video.videoWidth || 1280;
  canvas.height = video.videoHeight || 720;
  canvas.getContext('2d').drawImage(video, 0, 0);

  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const item = {
      id: Date.now() + Math.random(),
      url, mime: 'image/jpeg', type: 'photo',
      ts: new Date(),
      gps: gpsCoord ? {...gpsCoord} : null,
      addr: gpsAddr,
      cats: [],
    };
    pendingPhotoItem = item;
    openTypeModal();
  }, 'image/jpeg', 0.93);
}

// ══════════════════════
// TYPE MODAL
// ══════════════════════
function openTypeModal() {
  selectedTypes = [];
  renderTypeGrid();
  document.getElementById('typeConfirmBtn').disabled = true;
  // Show thumbnail of pending photo
  var thumb = document.getElementById('pendingThumb');
  if (thumb && pendingPhotoItem) thumb.src = pendingPhotoItem.url;
  document.getElementById('typeModal').classList.add('open');
}

function renderTypeGrid() {
  var el = document.getElementById('typeGrid');
  el.innerHTML = PHOTO_CATS.map(function(cat) {
    var cnt = items.filter(function(i){return i.cats && i.cats.includes(cat.key);}).length;
    var sel = selectedTypes.includes(cat.key);
    return '<div class="type-cell' + (sel ? ' selected' : '') + '" data-key="' + cat.key + '" style="color:' + cat.color + ';">'
      + '<div class="tc-icon">' + cat.icon + '</div>'
      + '<div class="tc-label">' + cat.key + '</div>'
      + '<div class="tc-count">' + cnt + '张</div>'
      + '</div>';
  }).join('');
  el.querySelectorAll('.type-cell').forEach(function(cell) {
    cell.addEventListener('click', function() { toggleTypeSel(cell.getAttribute('data-key')); });
  });
}


function toggleTypeSel(key) {
  if (selectedTypes.includes(key)) {
    selectedTypes = selectedTypes.filter(k => k !== key);
  } else {
    selectedTypes.push(key);
  }
  renderTypeGrid();
  document.getElementById('typeConfirmBtn').disabled = selectedTypes.length === 0;
}


function confirmType() {
  if (pendingPhotoItem) {
    pendingPhotoItem.cats = [...selectedTypes];
    items.unshift(pendingPhotoItem);
    pendingPhotoItem = null;
    updateCountUI();
    var total = items.filter(function(i){return i.type==='photo';}).length;
    var typeStr = selectedTypes.map(function(k) {
      var c = PHOTO_CATS.find(function(x){return x.key===k;});
      return (c ? c.icon : '') + k;
    }).join(' ');
    notify('✅ ' + typeStr + '  已拍' + total + '张 · 继续拍下一张');
  }
  closeTypeModal();
}


function skipType() {
  if (pendingPhotoItem) {
    pendingPhotoItem.cats = ['其他'];
    items.unshift(pendingPhotoItem);
    pendingPhotoItem = null;
    updateCountUI();
    notify('已保存（未标注类型）');
  }
  closeTypeModal();
}

function closeTypeModal() {
  document.getElementById('typeModal').classList.remove('open');
}

// ══════════════════════
// VIDEO RECORD
// ══════════════════════
function toggleRecord() {
  if (isRecording) stopRecord();
  else startRecord();
}

function startRecord() {
  if (!camStream) { notify('摄像头未启动'); return; }
  var mime = getSupportedMime();
  if (!mime) { notify('浏览器不支持录像'); return; }

  // Try to get audio+video stream
  navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'environment' },
    audio: true
  }).then(function(avStream) {
    _doRecord(avStream, mime, true);
  }).catch(function() {
    // Fallback: video only
    _doRecord(camStream, mime, false);
  });
}

var _recAvStream = null;
var pendingVideoItem = null;

function _doRecord(stream, mime, hasAudio) {
  _recAvStream = stream;
  recChunks = [];
  mediaRecorder = new MediaRecorder(stream, {mimeType: mime});
  mediaRecorder.ondataavailable = function(e) { if(e.data.size>0) recChunks.push(e.data); };
  mediaRecorder.onstop = function() {
    if (_recAvStream && _recAvStream !== camStream) {
      _recAvStream.getTracks().forEach(function(t){ t.stop(); });
    }
    _recAvStream = null;
    var blob = new Blob(recChunks, {type: mime});
    var url = URL.createObjectURL(blob);
    pendingVideoItem = {
      id: Date.now(), url: url, mime: mime, type: 'video',
      ts: new Date(), gps: gpsCoord ? Object.assign({}, gpsCoord) : null,
      addr: gpsAddr, cats: ['录像'], duration: recSecs,
      hasAudio: hasAudio,
    };
    showVideoConfirm();
  };
  mediaRecorder.start(500);
  isRecording = true;
  recSecs = 0;
  document.getElementById('shutterBtn').classList.add('recording');
  document.getElementById('recTimer').style.display = 'block';
  recTimer = setInterval(function() {
    recSecs++;
    document.getElementById('recTimer').textContent = '⏺ ' + recSecs + 's' + (hasAudio ? ' 🎙' : '');
    if (recSecs >= VIDEO_MAX_SECS) stopRecord();
  }, 1000);
}


function stopRecord() {
  if (!isRecording) return;
  clearInterval(recTimer);
  isRecording = false;
  mediaRecorder && mediaRecorder.stop();
  document.getElementById('shutterBtn').classList.remove('recording');
  document.getElementById('recTimer').style.display = 'none';
}

function showVideoConfirm() {
  var dur = document.getElementById('vcDuration');
  var modal = document.getElementById('videoConfirmModal');
  if (dur) dur.textContent = pendingVideoItem.duration + '秒';
  if (modal) modal.classList.add('open');
}

function saveVideo() {
  if (pendingVideoItem) {
    items.unshift(pendingVideoItem);
    updateCountUI();
    notify('🎥 录像已保存 ' + pendingVideoItem.duration + 's' + (pendingVideoItem.hasAudio ? ' 含语音' : ''));
    pendingVideoItem = null;
  }
  var modal = document.getElementById('videoConfirmModal');
  if (modal) modal.classList.remove('open');
}

function discardVideo() {
  pendingVideoItem = null;
  var modal = document.getElementById('videoConfirmModal');
  if (modal) modal.classList.remove('open');
  notify('录像已丢弃');
}
