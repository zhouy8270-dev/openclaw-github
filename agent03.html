<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeighborMind · 智能体03 · 策略框架生成</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f4f6fb;--white:#fff;--border:#e4e9f2;--text:#1a2235;--muted:#7a8aa0;
  --accent:#1d4ed8;--al:#eff4ff;
  --green:#059669;--gl:#ecfdf5;
  --orange:#d97706;--ol:#fffbeb;
  --red:#dc2626;--rl:#fef2f2;
  --purple:#7c3aed;--pl:#f5f3ff;
  --shadow:0 2px 12px rgba(0,0,0,0.06);
  --shadow-lg:0 8px 32px rgba(0,0,0,0.1);
  --r:14px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* TOP BAR */
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 28px;height:54px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.logo{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;display:flex;align-items:center;gap:8px;}
.logo em{color:var(--accent);font-style:normal;}
.sep{width:1px;height:16px;background:var(--border);}
.page-tag{font-size:13px;font-weight:500;display:flex;align-items:center;gap:7px;}
.chip{font-size:11px;padding:3px 8px;border-radius:6px;font-weight:500;background:var(--al);color:var(--accent);}
.topbar-r{display:flex;gap:8px;}
.btn{padding:7px 16px;border-radius:8px;font-size:12px;cursor:pointer;font-family:'Noto Sans SC',sans-serif;font-weight:500;display:flex;align-items:center;gap:5px;transition:all 0.15s;border:none;}
.btn-ghost{border:1px solid var(--border)!important;background:var(--white);color:var(--muted);}
.btn-ghost:hover{color:var(--text);background:var(--bg);}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{opacity:0.88;}

/* MAIN SPLIT */
.body{flex:1;display:grid;grid-template-columns:340px 1fr;overflow:hidden;}

/* ── LEFT INPUT PANEL ── */
.left{background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;}
.left-head{padding:16px 18px 0;flex-shrink:0;}
.left-head h2{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;margin-bottom:4px;}
.left-head p{font-size:11px;color:var(--muted);line-height:1.5;}
.left-tabs{display:flex;padding:10px 18px 0;gap:0;border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0;}
.left-tabs::-webkit-scrollbar{display:none;}
.ltab{padding:7px 12px;font-size:12px;cursor:pointer;border-bottom:2px solid transparent;color:var(--muted);white-space:nowrap;transition:all 0.15s;}
.ltab:hover{color:var(--text);}
.ltab.active{color:var(--accent);border-bottom-color:var(--accent);}
.ltab-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-left:4px;background:var(--border);vertical-align:middle;}
.ltab-dot.filled{background:var(--green);}

.left-body{flex:1;overflow-y:auto;padding:16px 18px;}
.left-body::-webkit-scrollbar{width:4px;}
.left-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
.input-section{display:none;}
.input-section.active{display:block;}

.field{margin-bottom:12px;}
.field label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px;letter-spacing:0.3px;}
.field input,.field textarea,.field select{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:12px;font-family:'Noto Sans SC',sans-serif;color:var(--text);outline:none;background:var(--white);transition:border-color 0.15s;line-height:1.6;}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent);}
.field textarea{resize:vertical;min-height:72px;}
.field-hint{font-size:10px;color:var(--muted);margin-top:3px;line-height:1.5;}

.tag-input-wrap{display:flex;flex-wrap:wrap;gap:5px;padding:7px 9px;border:1px solid var(--border);border-radius:8px;cursor:text;min-height:36px;transition:border-color 0.15s;}
.tag-input-wrap:focus-within{border-color:var(--accent);}
.tag-item{background:var(--al);color:var(--accent);font-size:11px;padding:2px 8px;border-radius:5px;display:flex;align-items:center;gap:4px;}
.tag-item button{background:none;border:none;cursor:pointer;color:var(--accent);font-size:11px;padding:0;line-height:1;}
.tag-input-wrap input{border:none;outline:none;font-size:12px;font-family:'Noto Sans SC',sans-serif;min-width:80px;flex:1;background:none;}

.upload-card{border:2px dashed var(--border);border-radius:11px;padding:18px 14px;text-align:center;cursor:pointer;transition:all 0.2s;margin-bottom:10px;}
.upload-card:hover,.upload-card.over{border-color:var(--accent);background:var(--al);}
.uc-icon{font-size:26px;margin-bottom:5px;}
.uc-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px;}
.uc-types{font-size:11px;color:var(--muted);}
.file-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.file-tag-item{display:flex;align-items:center;gap:5px;background:var(--al);border:1px solid rgba(29,78,216,0.15);color:var(--accent);font-size:11px;padding:3px 8px;border-radius:6px;}
.file-tag-del{background:none;border:none;cursor:pointer;color:var(--accent);font-size:11px;padding:0;}
.extract-box{background:var(--gl);border:1px solid rgba(5,150,105,0.15);border-radius:10px;padding:10px 12px;margin-bottom:10px;font-size:12px;line-height:1.7;color:var(--text);}
.extract-box-label{font-size:10px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;display:flex;align-items:center;gap:5px;}
.divider-or{font-size:11px;color:var(--muted);text-align:center;margin:10px 0;display:flex;align-items:center;gap:8px;}
.divider-or::before,.divider-or::after{content:'';flex:1;height:1px;background:var(--border);}

.left-foot{padding:14px 18px;border-top:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;gap:8px;}
.info-progress{display:flex;gap:3px;}
.ip-dot{flex:1;height:3px;border-radius:3px;background:var(--border);transition:background 0.3s;}
.ip-dot.filled{background:var(--green);}
.ip-lbl{font-size:10px;color:var(--muted);margin-bottom:4px;}
.gen-btn{width:100%;padding:12px;border-radius:11px;background:linear-gradient(135deg,var(--accent),#4f46e5);color:#fff;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans SC',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.15s;}
.gen-btn:hover{opacity:0.9;transform:translateY(-1px);}
.gen-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}

/* ── RIGHT OUTPUT PANEL ── */
.right{display:flex;flex-direction:column;overflow:hidden;}
.right-head{background:var(--white);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.right-head-l{display:flex;align-items:center;gap:10px;}
.framework-status{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;}
.right-scroll{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:14px;}
.right-scroll::-webkit-scrollbar{width:5px;}
.right-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:5px;}

/* EMPTY */
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--muted);}
.empty .ei{font-size:52px;opacity:0.2;}
.empty h3{font-size:15px;font-weight:600;color:var(--text);opacity:0.4;}
.empty p{font-size:13px;text-align:center;line-height:1.7;max-width:320px;}

/* FRAMEWORK BLOCKS */
.fw-block{background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;animation:up 0.4s ease forwards;opacity:0;}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.fw-block-head{padding:14px 18px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);}
.fw-level-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:0.5px;flex-shrink:0;}
.fw-block-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;flex:1;}
.fw-block-actions{display:flex;gap:6px;flex-shrink:0;}
.fw-action-btn{padding:5px 12px;border-radius:7px;font-size:11px;cursor:pointer;font-family:'Noto Sans SC',sans-serif;border:1px solid var(--border);background:var(--white);color:var(--muted);transition:all 0.15s;display:flex;align-items:center;gap:4px;}
.fw-action-btn:hover{color:var(--accent);border-color:var(--accent);background:var(--al);}
.fw-action-btn.regen{color:var(--orange);border-color:rgba(217,119,6,0.3);}
.fw-action-btn.regen:hover{background:var(--ol);}

.fw-block-body{padding:16px 18px;}

/* Content sections inside blocks */
.fw-section{margin-bottom:14px;}
.fw-section:last-child{margin-bottom:0;}
.fw-section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);margin-bottom:7px;display:flex;align-items:center;gap:6px;}
.fw-section-label span{font-weight:400;font-size:10px;text-transform:none;letter-spacing:0;}

/* Editable content */
.editable{font-size:13px;line-height:1.85;color:var(--text);outline:none;border-radius:8px;padding:8px 10px;border:1px solid transparent;transition:all 0.15s;font-family:'Noto Sans SC',sans-serif;min-height:40px;width:100%;}
.editable:hover{border-color:var(--border);background:var(--bg);}
.editable:focus{border-color:var(--accent);background:var(--white);}
.editable[placeholder]:empty::before{content:attr(placeholder);color:var(--muted);font-style:italic;}

/* Principle tags */
.principle-row{display:flex;flex-wrap:wrap;gap:6px;}
.principle-tag{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid;cursor:default;}

/* System grid (mid-level) */
.sys-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.sys-item{border:1px solid var(--border);border-radius:10px;padding:10px 12px;transition:all 0.15s;cursor:pointer;}
.sys-item:hover{border-color:var(--accent);box-shadow:var(--shadow);}
.sys-item.expanded{border-color:var(--accent);background:var(--al);}
.sys-icon{font-size:18px;margin-bottom:4px;}
.sys-name{font-size:12px;font-weight:600;margin-bottom:3px;}
.sys-status{font-size:10px;color:var(--muted);}
.sys-expand{margin-top:8px;padding-top:8px;border-top:1px solid var(--border);display:none;}
.sys-item.expanded .sys-expand{display:block;}
.sys-expand-text{font-size:11px;line-height:1.7;color:var(--text);outline:none;width:100%;border:none;background:none;font-family:'Noto Sans SC',sans-serif;resize:none;min-height:60px;}
.sys-expand-text:focus{background:var(--white);border-radius:6px;padding:4px;}

/* Task book (micro) */
.task-list{display:flex;flex-direction:column;gap:7px;}
.task-item{display:flex;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:9px;align-items:flex-start;transition:border-color 0.15s;}
.task-item:hover{border-color:#c8d4e8;}
.task-num{width:22px;height:22px;border-radius:50%;display:grid;place-items:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0;margin-top:1px;}
.task-body{flex:1;min-width:0;}
.task-title{font-size:12px;font-weight:600;margin-bottom:3px;outline:none;}
.task-title:focus{background:var(--bg);border-radius:4px;padding:2px 4px;}
.task-meta{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px;}
.task-tag{font-size:10px;padding:2px 7px;border-radius:5px;}

/* Comment area */
.comment-area{background:var(--bg);border-radius:10px;padding:12px 14px;margin-top:10px;}
.comment-area-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.comment-list{display:flex;flex-direction:column;gap:6px;margin-bottom:8px;}
.comment-item{display:flex;gap:8px;font-size:12px;}
.comment-av{width:22px;height:22px;border-radius:50%;display:grid;place-items:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0;}
.comment-bubble{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:6px 10px;flex:1;line-height:1.5;}
.comment-bubble .ct{color:var(--text);}
.comment-bubble .cm{font-size:10px;color:var(--muted);margin-top:2px;}
.comment-input-row{display:flex;gap:6px;}
.comment-inp{flex:1;padding:7px 10px;border:1px solid var(--border);border-radius:8px;font-size:12px;font-family:'Noto Sans SC',sans-serif;outline:none;background:var(--white);}
.comment-inp:focus{border-color:var(--accent);}
.comment-send{padding:7px 12px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:12px;cursor:pointer;white-space:nowrap;font-family:'Noto Sans SC',sans-serif;}

/* PROGRESS OVERLAY */
.prog-overlay{position:absolute;inset:0;background:rgba(255,255,255,0.95);backdrop-filter:blur(4px);display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:10;}
.prog-overlay.show{display:flex;}
.prog-box{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:28px 32px;width:360px;box-shadow:var(--shadow-lg);}
.prog-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.prog-bar{height:5px;background:var(--border);border-radius:5px;overflow:hidden;margin-bottom:14px;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),#4f46e5);border-radius:5px;transition:width 0.5s ease;width:0%;}
.prog-step{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:8px;}


/* UPLOAD CARDS */
.upload-card{border:2px dashed var(--border);border-radius:10px;padding:16px 12px;text-align:center;cursor:pointer;transition:all 0.2s;display:flex;flex-direction:column;align-items:center;gap:4px;}
.upload-card:hover,.upload-card.over{border-color:var(--accent);background:var(--al);}
.uc-icon{font-size:24px;}
.uc-title{font-size:13px;font-weight:600;color:var(--text);}
.uc-sub{font-size:11px;color:var(--muted);}
.uc-types{display:flex;gap:4px;margin-top:2px;}
.uc-types span,.type-pill-sm{font-size:10px;background:var(--bg);border:1px solid var(--border);padding:1px 6px;border-radius:6px;color:var(--muted);}
.file-tags{display:flex;flex-direction:column;gap:4px;margin-top:6px;}
.ftag{display:flex;align-items:center;gap:7px;padding:5px 8px;border-radius:7px;background:var(--bg);border:1px solid var(--border);font-size:11px;}
.ftag-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ftag-del{background:none;border:none;cursor:pointer;color:var(--muted);font-size:12px;padding:0 2px;}
.ftag-del:hover{color:var(--red);}

/* FEEDBACK AREA */
.fb-area{margin-top:12px;border-top:1px dashed var(--border);padding-top:12px;}
.fb-row{display:flex;gap:8px;align-items:flex-start;}
.fb-inp{flex:1;padding:8px 11px;border:1px solid var(--border);border-radius:8px;font-size:12px;font-family:'Noto Sans SC',sans-serif;outline:none;resize:none;min-height:40px;color:var(--text);transition:border-color 0.15s;line-height:1.6;}
.fb-inp:focus{border-color:var(--accent);}
.fb-inp::placeholder{color:var(--muted);}
.fb-btn{padding:8px 14px;border-radius:8px;background:var(--accent);color:#fff;border:none;font-size:12px;cursor:pointer;font-family:'Noto Sans SC',sans-serif;font-weight:500;white-space:nowrap;display:flex;align-items:center;gap:5px;transition:opacity 0.15s;flex-shrink:0;}
.fb-btn:hover{opacity:0.88;}
.fb-btn:disabled{opacity:0.4;cursor:not-allowed;}
.fb-hint{font-size:10px;color:var(--muted);margin-top:5px;}

/* RIGHT TABS */
.rtab{padding:11px 20px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;color:var(--muted);font-weight:500;transition:all 0.15s;white-space:nowrap;user-select:none;}
.rtab:hover{color:var(--text);}
.rtab.active{color:var(--accent);border-bottom-color:var(--accent);}
.right-scroll{flex:1;overflow-y:auto;padding:24px;}
.right-scroll::-webkit-scrollbar{width:5px;}
.right-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:5px;}

/* ── SECTION BLOCKS (macro) ── */
.fw-section-block{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:20px 22px;margin-bottom:14px;animation:up 0.35s ease forwards;opacity:0;}
.fsb-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:10px;}
.fsb-content{font-size:14px;line-height:1.8;color:var(--text);outline:none;padding:6px 8px;border-radius:8px;border:1px solid transparent;transition:all 0.15s;min-height:32px;}
.fsb-content:hover{border-color:var(--border);background:var(--bg);}
.fsb-content:focus{border-color:var(--accent);background:var(--white);}
.fsb-item{font-size:13px;line-height:1.8;color:var(--text);outline:none;padding:4px 8px;border-radius:6px;border:1px solid transparent;transition:all 0.15s;margin-bottom:3px;}
.fsb-item:hover{border-color:var(--border);background:var(--bg);}
.fsb-item:focus{border-color:var(--accent);background:var(--white);}

/* ── ITEM CHAT BOX ── */
.item-chat{margin-top:12px;padding-top:12px;border-top:1px dashed var(--border);}
.chat-row{display:flex;gap:8px;align-items:flex-start;}
.chat-inp{flex:1;padding:8px 11px;border:1px solid var(--border);border-radius:8px;font-size:12px;font-family:'Noto Sans SC',sans-serif;outline:none;resize:none;height:38px;color:var(--text);transition:border-color 0.15s;line-height:1.5;}
.chat-inp:focus{border-color:var(--accent);height:64px;}
.chat-inp::placeholder{color:var(--muted);}
.chat-btn{padding:8px 14px;border-radius:8px;background:var(--accent);color:#fff;border:none;font-size:12px;cursor:pointer;font-family:'Noto Sans SC',sans-serif;font-weight:500;white-space:nowrap;flex-shrink:0;transition:opacity 0.15s;}
.chat-btn:hover{opacity:0.88;}
.chat-btn:disabled{opacity:0.4;cursor:not-allowed;}

/* ── MESO SYSTEM CARDS ── */
.sys-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:all 0.2s;text-align:center;}
.sys-card:hover{border-color:var(--accent);box-shadow:var(--shadow);transform:translateY(-2px);}
.sys-card-icon{font-size:28px;margin-bottom:8px;}
.sys-card-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;margin-bottom:4px;}
.sys-card-cur{font-size:11px;color:var(--muted);line-height:1.5;margin-bottom:8px;}
.sys-card-arrow{font-size:11px;color:var(--accent);font-weight:500;}

/* ── MICRO TASK CARDS ── */
.micro-task-card{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;animation:up 0.3s ease forwards;opacity:0;}
.mtc-head{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;user-select:none;transition:background 0.15s;}
.mtc-head:hover{background:var(--bg);}
.mtc-num{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;}
.mtc-title{flex:1;font-size:13px;font-weight:600;}
.mtc-type{font-size:11px;color:var(--muted);background:var(--bg);padding:2px 8px;border-radius:6px;}
.mtc-chev{color:var(--muted);font-size:12px;transition:transform 0.2s;}
.mtc-chev.open{transform:rotate(180deg);}
.mtc-body{padding:16px;border-top:1px solid var(--border);}
.mtc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.mtc-field{background:var(--bg);border-radius:9px;padding:10px 12px;}
.mtc-flabel{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:5px;}
.mtc-fval{font-size:12px;line-height:1.7;color:var(--text);outline:none;min-height:24px;}
.mtc-fval:focus{background:var(--white);border-radius:6px;padding:2px 4px;}

/* ── SYS DETAIL MODAL ── */
.sys-modal{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.4);backdrop-filter:blur(4px);display:none;place-items:center;}
.sys-modal.open{display:grid;}
.sys-modal-box{background:var(--white);border-radius:20px;width:90%;max-width:760px;max-height:88vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--shadow-lg);animation:mIn 0.22s ease;}

.sys-modal-hd{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;}

.sys-modal-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;flex:1;}
.sys-modal-close{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:none;cursor:pointer;font-size:16px;color:var(--muted);display:grid;place-items:center;}
.sys-modal-body{overflow-y:auto;padding:22px;flex:1;display:flex;flex-direction:column;gap:16px;}
.sys-modal-body::-webkit-scrollbar{width:5px;}

.svg-placeholder{background:var(--bg);border:2px dashed var(--border);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:var(--muted);cursor:pointer;transition:all 0.2s;}
.svg-placeholder:hover{border-color:var(--accent);background:var(--al);}

/* ── MESO SYSTEM LIST ── */
.meso-list{display:flex;flex-direction:column;gap:8px;}
.meso-sys-row{background:var(--white);border:1px solid var(--border);border-radius:12px;display:flex;align-items:center;gap:12px;padding:14px 16px;transition:all 0.2s;animation:up 0.3s ease forwards;opacity:0;}
.meso-sys-row:hover{border-color:#c8d4e8;box-shadow:var(--shadow);}
.meso-sys-icon{font-size:22px;width:40px;height:40px;border-radius:10px;display:grid;place-items:center;flex-shrink:0;}
.meso-sys-info{flex:1;min-width:0;}
.meso-sys-name{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;}
.meso-sys-desc{font-size:11px;color:var(--muted);margin-top:2px;}
.meso-sys-actions{display:flex;gap:6px;flex-shrink:0;}
.meso-enter-btn{padding:6px 14px;border-radius:8px;border:1px solid var(--accent);color:var(--accent);background:var(--al);font-size:12px;cursor:pointer;font-family:'Noto Sans SC',sans-serif;font-weight:500;transition:all 0.15s;}
.meso-enter-btn:hover{background:var(--accent);color:#fff;}
.meso-del-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--white);color:var(--muted);font-size:14px;cursor:pointer;display:grid;place-items:center;transition:all 0.15s;}
.meso-del-btn:hover{border-color:var(--red);color:var(--red);background:var(--rl);}
.meso-add-row{border:2px dashed var(--border);border-radius:12px;padding:14px;text-align:center;cursor:pointer;transition:all 0.2s;color:var(--muted);font-size:13px;}
.meso-add-row:hover{border-color:var(--accent);color:var(--accent);background:var(--al);}

/* ── MESO DETAIL MODAL (full redesign) ── */
.meso-modal{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.45);backdrop-filter:blur(5px);display:none;place-items:center;}
.meso-modal.open{display:grid;}
.meso-modal-box{background:var(--bg);border-radius:20px;width:95%;max-width:900px;max-height:92vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,0.2);animation:mIn 0.22s ease;}
.meso-modal-hd{background:var(--white);padding:16px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;}
.meso-modal-icon{font-size:26px;width:42px;height:42px;border-radius:10px;display:grid;place-items:center;}
.meso-modal-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;flex:1;}
.meso-modal-close{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:none;cursor:pointer;font-size:16px;color:var(--muted);display:grid;place-items:center;}

/* Sub-tabs (for traffic) */
.meso-subtabs{background:var(--white);border-bottom:1px solid var(--border);padding:0 22px;display:flex;gap:0;flex-shrink:0;}
.meso-stab{padding:10px 18px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;color:var(--muted);font-weight:500;transition:all 0.15s;}
.meso-stab:hover{color:var(--text);}
.meso-stab.active{color:var(--accent);border-bottom-color:var(--accent);}

.meso-modal-body{overflow-y:auto;padding:20px 22px;flex:1;display:flex;flex-direction:column;gap:16px;}
.meso-modal-body::-webkit-scrollbar{width:5px;}
.meso-modal-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:5px;}

/* Map/diagram pair */

.diagram-box{display:flex;flex-direction:column;gap:8px;}

.diagram-img{background:var(--bg);border:2px dashed var(--border);border-radius:12px;aspect-ratio:4/3;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;}

.diagram-img img{width:100%;height:100%;object-fit:cover;border-radius:10px;}
.diagram-img .di-placeholder{display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--muted);}
.diagram-desc{font-size:12px;line-height:1.7;color:var(--text);padding:10px 12px;background:var(--bg);border-radius:9px;outline:none;min-height:60px;border:1px solid transparent;transition:all 0.15s;}
.diagram-desc:hover{border-color:var(--border);background:var(--white);}
.diagram-desc:focus{border-color:var(--accent);background:var(--white);}
.diagram-desc[placeholder]:empty::before{content:attr(placeholder);color:var(--muted);}

/* Data row */
.data-row{display:flex;gap:10px;flex-wrap:wrap;}
.data-chip{background:var(--white);border:1px solid var(--border);border-radius:9px;padding:10px 14px;display:flex;flex-direction:column;gap:3px;min-width:100px;}

.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,0.25);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;}
.spin-b{display:inline-block;width:12px;height:12px;border:2px solid rgba(29,78,216,0.15);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}

.notif{position:fixed;bottom:20px;right:24px;background:var(--text);color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;box-shadow:var(--shadow-lg);transform:translateY(16px);opacity:0;transition:all 0.25s;z-index:300;}
.notif.show{transform:translateY(0);opacity:1;}

input[type=file]{display:none;}

@media(max-width:900px){
  .body{grid-template-columns:1fr;}
  .left{max-height:45vh;}
  .sys-grid{grid-template-columns:repeat(2,1fr);}
}

    <!-- RIGHT -->

<script>
// ── STATE ──
const filled = { planning:false, policy:false };
let fwData = null;
let comments = {};
const USERS = ['我','张工','李工','王总'];
let curUser = 0;

// ── LEFT TABS ──
function switchLTab(sec, el) {
  document.querySelectorAll('.ltab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.input-section').forEach(s => s.classList.remove('active'));
  document.getElementById('sec-'+sec).classList.add('active');
}

function markFilled(sec) {
  filled[sec] = true;
  document.getElementById('dot-'+sec).classList.add('filled');
  document.getElementById('ip-'+sec).classList.add('filled');
  const cnt = Object.values(filled).filter(Boolean).length;
  document.getElementById('fillLbl').textContent = `已上传 ${cnt} / 2 类文件`;
}

// ── FILE UPLOAD HANDLING ──

function triggerUpload(sec) {
  document.getElementById('fi-'+sec).click();
}

function dzOver(e, sec) { e.preventDefault(); document.getElementById('dz-'+sec)?.classList.add('over'); }
function dzOut(sec) { document.getElementById('dz-'+sec)?.classList.remove('over'); }
function dzDrop(e, sec) {
  e.preventDefault(); dzOut(sec);
  const files = Array.from(e.dataTransfer.files);
  processFiles(sec, files);
}

function handleUpload(sec, input) {
  processFiles(sec, Array.from(input.files));
  input.value = '';
}

function processFiles(sec, files) {
  if (!uploadedFiles[sec]) uploadedFiles[sec] = [];
  files.forEach(f => uploadedFiles[sec].push({ name: f.name, size: f.size, url: URL.createObjectURL(f), mime: f.type, file: f }));
  markFilled(sec);
  renderFileTags(sec);
  autoExtract(sec);
}

function renderFileTags(sec) {
  const tags = document.getElementById('ft-'+sec);
  if (!tags) return;
  const files = uploadedFiles[sec] || [];
  tags.innerHTML = files.map((f, i) => `
    <div class="file-tag-item">
      <span>${getFileIcon(f.name)}</span>
      <span>${f.name.length > 16 ? f.name.slice(0,14)+'…' : f.name}</span>
      <button class="file-tag-del" onclick="removeUploadedFile('${sec}',${i})">✕</button>
    </div>`).join('');
}

function removeUploadedFile(sec, i) {
  uploadedFiles[sec].splice(i, 1);
  renderFileTags(sec);
  if (!uploadedFiles[sec].length) document.getElementById('ex-'+sec).style.display = 'none';
}

async function autoExtract(sec) {
  const files = uploadedFiles[sec] || [];
  if (!files.length) return;
  const exBox = document.getElementById('ex-'+sec);
  exBox.style.display = 'block';
  exBox.innerHTML = `<div class="extract-box-label"><span class="spin-b"></span> AI 正在提取关键信息…</div>`;

  const SEC_LABELS = {
    basic:'项目基本信息', planning:'上位规划要点', policy:'政策背景要点',
    culture:'文化历史要点', social:'社会人口要点', client:'甲方诉求要点'
  };

  // For images, use vision API
  const imgFile = files.find(f => f.mime && f.mime.startsWith('image/'));
  try {
    let result = '';
    if (imgFile) {
      const b64 = await toBase64(imgFile.url, imgFile.mime);
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          model:'claude-sonnet-4-20250514', max_tokens:1000,
          messages:[{role:'user', content:[
            {type:'image', source:{type:'base64', media_type:imgFile.mime, data:b64}},
            {type:'text', text:`请从这个文件中提取与"${SEC_LABELS[sec]}"相关的关键信息，用简洁的要点列出（每点不超过30字，最多6点），只返回要点列表，每点以"•"开头。`}
          ]}]
        })
      });
      const d = await res.json();
      result = d.content?.[0]?.text || '';
    } else {
      // For non-image files, ask Claude to generate based on filename and context
      const fileNames = files.map(f=>f.name).join('、');
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          model:'claude-sonnet-4-20250514', max_tokens:1000,
          messages:[{role:'user', content:`用户上传了以下文件用于社区微更新项目的"${SEC_LABELS[sec]}"：${fileNames}。
请根据文件名推断可能包含的关键信息类型，并提示用户应该从这些文件中关注哪些要点，用"•"开头列出5-6条提示，每条不超过30字。`}]
        })
      });
      const d = await res.json();
      result = d.content?.[0]?.text || '';
    }
    exBox.innerHTML = `
      <div class="extract-box-label">✅ AI 提取要点</div>
      <div style="white-space:pre-line;line-height:1.8;">${result}</div>`;
  } catch(e) {
    exBox.innerHTML = `<div class="extract-box-label">📎 已上传 ${files.length} 个文件</div><div style="font-size:11px;color:var(--muted);">文件将在生成策略时作为背景参考</div>`;
  }
}

function getFileIcon(name) {
  const ext = (name||'').split('.').pop().toLowerCase();
  return {pdf:'📄',docx:'📝',doc:'📝',xlsx:'📊',csv:'📊',mp3:'🎵',m4a:'🎵',txt:'📃',jpg:'🖼',png:'🖼',jpeg:'🖼'}[ext]||'📁';
}

async function toBase64(url, mime) {
  const blob = await (await fetch(url)).blob();
  return new Promise(res => { const r=new FileReader(); r.onload=()=>res(r.result.split(',')[1]); r.readAsDataURL(blob); });
}

// ── COLLECT INPUT ──

// ── FILE UPLOAD (planning / policy) ──
const uploadedFiles = { planning: [], policy: [] };

function triggerUpload(sec) { document.getElementById('fi-'+sec).click(); }

function handleUpload(sec, input) {
  Array.from(input.files).forEach(f => {
    uploadedFiles[sec].push({ name: f.name, size: f.size });
  });
  renderFileTags(sec);
  markFilled(sec);
  input.value = '';
}

function renderFileTags(sec) {
  const container = document.getElementById('ft-'+sec);
  if (!container) return;
  container.innerHTML = uploadedFiles[sec].map((f, i) => `
    <div class="ftag">
      <span>📄</span>
      <span class="ftag-name">${f.name}</span>
      <span style="color:var(--muted);font-size:10px;">${(f.size/1024).toFixed(0)}KB</span>
      <button class="ftag-del" onclick="removeFile('${sec}',${i})">✕</button>
    </div>`).join('');
}

function removeFile(sec, i) {
  uploadedFiles[sec].splice(i, 1);
  renderFileTags(sec);
}

function dzOver(e, sec) { e.preventDefault(); document.getElementById('dz-'+sec)?.classList.add('over'); }
function dzOut(sec) { document.getElementById('dz-'+sec)?.classList.remove('over'); }
function dzDrop(e, sec) {
  e.preventDefault(); dzOut(sec);
  const dt = new DataTransfer();
  Array.from(e.dataTransfer.files).forEach(f => dt.items.add(f));
  const fi = document.getElementById('fi-'+sec);
  fi.files = dt.files;
  fi.dispatchEvent(new Event('change'));
}

// ── READ FROM AGENT01 (localStorage) ──
function loadAgent01Data() {
  try {
    const basic = JSON.parse(localStorage.getItem('nm_basic') || 'null');
    const culture = JSON.parse(localStorage.getItem('nm_culture') || 'null');
    const preview = document.getElementById('agent01Preview');
    const empty = document.getElementById('agent01Empty');
    if (!basic && !culture) { preview.style.display='none'; empty.style.display='block'; return; }
    empty.style.display = 'none';
    preview.style.display = 'block';
    let html = '';
    if (basic) {

async function generate() {

  btn.disabled = true;
  btn.innerHTML = '<div class="spin"></div> 生成中…';
  showProg('读取项目信息…', 10);

async function genMacro(inp) {
  const prompt = `你是资深城市社区微更新规划师。根据以下项目信息，生成宏观战略定位，只返回JSON（无其他内容）：
{
  "necessity": "项目必要性（3点，每点20字以内）",
  "significance": "项目意义（3点，每点20字以内）",
  "vision": "愿景目标（30字以内）",
  "positioning": "项目定位（40字以内）",
  "principles": [{"name":"原则名","desc":"原则说明（20字）","color":"hex颜色"}],
  "objectives": ["目标1（20字）","目标2","目标3","目标4"]
}
项目名：${inp.name}，城市：${inp.city}，建成年代：${inp.year}，面积：${inp.area}㎡，户数：${inp.households}，人口：${inp.population}，老龄化：${inp.elderly}，儿童占比：${inp.children}，背景：${inp.bg}，上位规划：${inp.planning}，政策：${inp.policy}，文化历史：${inp.culture}，预算：${inp.budget}万`;
  return await callClaude(prompt);
}

async function genMeso(inp) {
  const prompt = `你是城市社区微更新规划师。根据以下项目信息，判断需要梳理哪些系统（不必全部，根据项目实际情况选3-6个最相关的），生成中观系统框架，只返回JSON对象（key为系统英文简称，无其他内容）：
{
  "traffic": {"name":"交通停车","icon":"🚗","current":"现状问题（20字）","strategy":"系统策略（40字）"},
  "landscape": {"name":"景观绿化","icon":"🌿","current":"现状问题","strategy":"系统策略"}
}
可选系统：空间结构、交通停车、景观绿化、建筑风貌、文化活力、公共服务、市政基础、生态环境、经济运营。
只选与项目最相关的系统，不要凑数。
项目：${inp.name}，面积：${inp.area}㎡，户数：${inp.households}，人口：${inp.population}，老龄化：${inp.elderly}，背景：${inp.bg}，文化：${inp.culture}，上位规划：${inp.planning}，政策：${inp.policy}`;
  return await callClaude(prompt);
}

async function genMicro(inp) {
  const prompt = `你是资深城市社区微更新规划师。根据以下项目信息，生成微观设计任务书要点，只返回JSON数组（无其他内容）：
[
  {"category":"专项类别","item":"设计任务项","quantity":"数量/规模","standard":"设计标准要求","priority":"高/中/低","note":"备注"}
]
生成8-10项，覆盖环境、交通、设施等主要方面。
项目：${inp.name}，预算：${inp.budget}万，面积：${inp.area}㎡，户数：${inp.households}，人口：${inp.population}，老龄化：${inp.elderly}，文化历史：${inp.culture}`;
  return await callClaude(prompt);
}

async function callClaude(prompt) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:1000, messages:[{role:'user',content:prompt}] })
  });
  const d = await res.json();
  const txt = d.content?.[0]?.text || '';
  return JSON.parse(txt.replace(/```json|```/g,'').trim());
}

// ── REGEN WITH FEEDBACK ──
async function regenWithFeedback(block) {
  const inp = document.getElementById('fb-' + block);
  const btn = document.getElementById('fb-btn-' + block);
  if (!inp || !btn) return;
  const feedback = inp.value.trim();
  if (!feedback) { notify('请先填写修改意见'); inp.focus(); return; }

  btn.disabled = true;
  btn.innerHTML = '<div class="spin"></div> 修改中…';

  const input = fwData?.input || collectInput();
  const current = fwData?.[block];

  try {
    let prompt = '';
    if (block === 'macro') {
      prompt = `你是城市社区微更新规划师。以下是当前宏观战略框架内容：
${JSON.stringify(current, null, 2)}

用户的修改意见：「${feedback}」

请根据意见修改并返回完整的JSON（格式与原来相同，只返回JSON）。`;
    } else if (block === 'meso') {
      prompt = `你是城市社区微更新规划师。以下是当前中观系统框架：
${JSON.stringify(current, null, 2)}

用户的修改意见：「${feedback}」

请根据意见修改并返回完整的JSON（格式与原来相同，只返回JSON）。`;
    } else if (block === 'micro') {
      prompt = `你是城市社区微更新规划师。以下是当前微观任务书：
${JSON.stringify(current, null, 2)}

用户的修改意见：「${feedback}」

请根据意见修改并返回完整的JSON数组（格式与原来相同，只返回JSON数组）。`;
    }

    const res = await callClaude(prompt);
    fwData[block] = res;
    renderFramework(fwData);
    notify('✅ 已根据意见修改，请查看更新内容');
    // Restore feedback text so user can see what they wrote
    setTimeout(() => {
      const newInp = document.getElementById('fb-' + block);
      if (newInp) newInp.value = feedback;
    }, 100);

  } catch(e) {
    notify('⚠️ 修改失败，请稍后重试');
    btn.disabled = false;
    btn.innerHTML = '✨ AI修改';
  }
}


// ── REFINE SINGLE ITEM ──
async function refineItem(key) {
  const inp = document.getElementById('ci-' + key);
  const btn = inp?.nextElementSibling;
  if (!inp || !btn) return;
  const feedback = inp.value.trim();
  if (!feedback) { notify('请先填写修改意见'); inp.focus(); return; }

  btn.disabled = true;
  btn.innerHTML = '<div class="spin"></div>';

  try {
    const currentContent = key.startsWith('micro-')
      ? document.getElementById('mtc-' + key.split('-')[1])?.innerText || ''
      : document.getElementById('item-' + key)?.innerText || document.querySelectorAll('[id^="item-'+key+'"]')?.[0]?.innerText || '';

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514', max_tokens: 1000,
        messages: [{ role: 'user', content: `你是城市社区微更新规划师。当前内容：「${currentContent}」。用户修改意见：「${feedback}」。请直接输出修改后的内容，不要任何解释，不要引号，保持原来的格式风格。` }]
      })
    });
    const d = await res.json();
    const newText = d.content?.[0]?.text?.trim() || '';
    if (!newText) throw new Error('empty');

    // Update the relevant element
    if (key === 'positioning') document.getElementById('item-positioning').innerText = newText;
    else if (key === 'vision') document.getElementById('item-vision').innerText = newText;
    else if (key === 'necessity') {
      const items = document.querySelectorAll('[id^="item-necessity-"]');
      const lines = newText.split('\n').filter(l => l.trim());
      items.forEach((el, i) => { if (lines[i]) el.innerText = '• ' + lines[i].replace(/^[•\-\d\.]+\s*/, ''); });
    } else if (key === 'significance') {
      const items = document.querySelectorAll('[id^="item-significance-"]');
      const lines = newText.split('\n').filter(l => l.trim());
      items.forEach((el, i) => { if (lines[i]) el.innerText = '• ' + lines[i].replace(/^[•\-\d\.]+\s*/, ''); });
    } else if (key === 'principles') {
      const items = document.querySelectorAll('[id^="item-principle-"]');
      const lines = newText.split('\n').filter(l => l.trim());
      items.forEach((el, i) => { if (lines[i]) el.innerText = lines[i].replace(/^[•\-\d\.]+\s*/, '').split(/[：:]/)[0].trim(); });
    }

    inp.value = '';
    notify('✅ 已根据意见修改');
  } catch(e) {
    notify('⚠️ 修改失败，请重试');
  }
  btn.disabled = false;
  btn.innerHTML = '✨ 修改';
}

function openMesoDetail(i) {
  const sys = window._mesoSystems[i];
  if (!sys) return;
  const cfg = SYS_DETAIL_CONFIG[sys.key] || { type:'compare', curLabel:'现状', planLabel:'规划' };

  const modal = document.getElementById('mesoModal');
  document.getElementById('mesoModalIcon').textContent = sys.icon || '📌';
  document.getElementById('mesoModalTitle').textContent = sys.name;

  const subtabsEl = document.getElementById('mesoModalSubtabs');
  const bodyEl = document.getElementById('mesoModalBody');

  if (cfg.type === 'subtabs') {
    subtabsEl.style.display = 'flex';
    subtabsEl.innerHTML = cfg.subtabs.map((st,si) =>
      `<div class="meso-stab ${si===0?'active':''}" id="mstab-${si}" onclick="switchMesoSubtab(${i},${si})">${st.icon} ${st.label}</div>`
    ).join('');
    renderMesoSubtab(i, 0, cfg);
  } else {
    subtabsEl.style.display = 'none';
    renderMesoBody(i, cfg, bodyEl);
  }

  modal.classList.add('open');
  window._currentMesoIdx = i;
}

function switchMesoSubtab(sysIdx, tabIdx) {
  document.querySelectorAll('.meso-stab').forEach((t,i) => t.classList.toggle('active', i===tabIdx));
  const cfg = SYS_DETAIL_CONFIG[window._mesoSystems[sysIdx].key];
  renderMesoSubtab(sysIdx, tabIdx, cfg);
}

function renderMesoSubtab(sysIdx, tabIdx, cfg) {
  const st = cfg.subtabs[tabIdx];

async function refineMesoItem(key) {
  const inp = document.getElementById('ci-' + key);
  const btn = inp?.nextElementSibling;

  const feedback = inp.value.trim();
  if (!feedback) { notify('请填写修改意见'); return; }
  btn.disabled = true; btn.innerHTML = '<div class="spin"></div>';
  try {
    const sysIdx = parseInt(key.split('-')[1]);

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},

      })

    const d = await res.json();
    const p = JSON.parse((d.content?.[0]?.text||'{}').replace(/\`\`\`json|\`\`\`/g,'').trim());

}

function uploadDiagram(el) {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const url = URL.createObjectURL(file);
    el.innerHTML = `<img src="${url}">`;
  };
  input.click();
}

function initMicroMap() {
  if (_microMap) return;
  const mapEl = document.getElementById('microMap');
  if (!mapEl || typeof L === 'undefined') return;

  _microMap = L.map('microMap', { zoomControl: true }).setView([39.9042, 116.4074], 16);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap', maxZoom: 19
  }).addTo(_microMap);

  _microMap.on('click', e => {
    if (!_markMode) return;
    const cat = document.getElementById('markingCat')?.value || 'node';
    const catCfg = MICRO_CATS.find(c => c.key === cat);
    const name = prompt(`标注名称（如：1号大门）：`, catCfg?.label + (window._microTasks.filter(t=>t.cat===cat).length+1));
    if (!name) return;

    const task = {
      id: Date.now(),
      cat, name,
      theme: '', func: '', notes: '',
      lat: e.latlng.lat, lng: e.latlng.lng,
      address: `${e.latlng.lat.toFixed(5)}, ${e.latlng.lng.toFixed(5)}`,
    };
    window._microTasks.push(task);
    addMapMarker(task);
    renderMicroTasks();
    setMarkMode(false);
    notify('✅ 已添加：' + name);
  });

  // Add existing tasks to map
  (window._microTasks||[]).forEach(t => { if(t.lat) addMapMarker(t); });
}

function addMapMarker(task) {
  const catCfg = MICRO_CATS.find(c => c.key === task.cat);
  const color = catCfg?.color || '#6b7280';
  const icon = L.divIcon({
    html: `<div style="background:${color};color:#fff;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;box-shadow:0 2px 8px rgba(0,0,0,0.3);border:2px solid #fff;">${catCfg?.icon||'📍'}</div>`,
    className: '', iconSize:[28,28], iconAnchor:[14,14]
  });
  const marker = L.marker([task.lat, task.lng], { icon })
    .addTo(_microMap)
    .bindPopup(`<b>${task.name}</b><br>${catCfg?.label||''}`);
  _markers.push({ id: task.id, marker });
}

function setMarkMode(on) {
  _markMode = on;
  const btn = document.getElementById('markBtn');
  if (btn) {
    btn.textContent = on ? '🎯 点击地图标注…' : '✚ 点击标注';
    btn.style.background = on ? '#dc2626' : 'var(--accent)';
  }
  if (_microMap) _microMap.getContainer().style.cursor = on ? 'crosshair' : '';
}

function renderMicroTasks() {
  const panel = document.getElementById('microTaskPanel');
  const count = document.getElementById('microCount');
  if (!panel) return;
  const tasks = window._microTasks || [];
  if (count) count.textContent = tasks.length + ' 个点位';

  // Group by category
  const groups = {};
  MICRO_CATS.forEach(c => { groups[c.key] = []; });
  tasks.forEach(t => { if (!groups[t.cat]) groups[t.cat]=[]; groups[t.cat].push(t); });

  panel.innerHTML = MICRO_CATS.filter(c => groups[c.key]?.length > 0).map(cat => `
    <div style="margin-bottom:14px;">
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:${cat.color};margin-bottom:6px;display:flex;align-items:center;gap:5px;">
        ${cat.icon} ${cat.label} <span style="font-weight:400;color:var(--muted);">(${groups[cat.key].length})</span>
      </div>
      ${groups[cat.key].map((t,i) => `
        <div style="background:var(--white);border:1px solid var(--border);border-radius:10px;margin-bottom:6px;overflow:hidden;">
          <div style="padding:10px 12px;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;" onclick="toggleMicroTask('${t.id}')">
            <div style="width:22px;height:22px;border-radius:50%;background:${cat.color};color:#fff;display:grid;place-items:center;font-size:10px;font-weight:700;flex-shrink:0;">${i+1}</div>
            <div style="flex:1;font-size:12px;font-weight:600;">${t.name}</div>
            ${t.lat ? `<span style="font-size:10px;color:${cat.color};">📍 已标注</span>` : `<span style="font-size:10px;color:var(--muted);">未标注</span>`}
            <button onclick="event.stopPropagation();deleteMicroTask('${t.id}')" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:0 2px;">×</button>
            <span style="color:var(--muted);font-size:10px;" id="mchev-${t.id}">▼</span>
          </div>
          <div id="mbody-${t.id}" style="display:none;padding:0 12px 12px;border-top:1px solid var(--border);">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;">
              <div>
                <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;">主题</div>
                <div contenteditable="true" style="font-size:12px;padding:7px 9px;background:var(--bg);border-radius:7px;outline:none;min-height:32px;line-height:1.6;" placeholder="主题定位…">${t.theme||''}</div>
              </div>
              <div>
                <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;">功能</div>
                <div contenteditable="true" style="font-size:12px;padding:7px 9px;background:var(--bg);border-radius:7px;outline:none;min-height:32px;line-height:1.6;" placeholder="主要功能…">${t.func||''}</div>
              </div>
              <div style="grid-column:1/-1;">
                <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;">注意事项</div>
                <div contenteditable="true" style="font-size:12px;padding:7px 9px;background:var(--bg);border-radius:7px;outline:none;min-height:40px;line-height:1.6;" placeholder="设计注意事项、约束条件…">${t.notes||''}</div>
              </div>
              ${t.lat ? `<div style="grid-column:1/-1;font-size:11px;color:var(--muted);">📍 ${t.address||'已标注坐标'}</div>` : `
              <div style="grid-column:1/-1;">
                <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;">或文字描述位置</div>
                <input type="text" placeholder="如：南侧主入口大门处" style="width:100%;padding:7px 9px;border:1px solid var(--border);border-radius:7px;font-size:12px;font-family:'Noto Sans SC',sans-serif;outline:none;">
              </div>`}
            </div>
          </div>
        </div>`).join('')}
      <button onclick="addMicroTaskCat('${cat.key}')" style="width:100%;padding:7px;border:1px dashed var(--border);border-radius:8px;background:none;font-size:11px;color:var(--muted);cursor:pointer;font-family:'Noto Sans SC',sans-serif;transition:all 0.15s;" onmouseover="this.style.borderColor='${cat.color}';this.style.color='${cat.color}'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">＋ 添加${cat.label}</button>
    </div>`).join('') +
    (tasks.length === 0 ? '<div style="text-align:center;padding:40px 20px;color:var(--muted);font-size:13px;">在地图上点击标注，或点击下方分类添加点位</div>' : '') +
    `<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:6px;">
      ${MICRO_CATS.map(c => `<button onclick="addMicroTaskCat('${c.key}')" style="padding:5px 10px;border:1px solid var(--border);border-radius:20px;font-size:11px;cursor:pointer;background:var(--white);font-family:'Noto Sans SC',sans-serif;">${c.icon} ${c.label}</button>`).join('')}
    </div>`;
}

function toggleMicroTask(id) {
  const body = document.getElementById('mbody-' + id);
  const chev = document.getElementById('mchev-' + id);
  if (!body) return;
  const open = body.style.display !== 'none';
  body.style.display = open ? 'none' : 'block';
  if (chev) chev.textContent = open ? '▼' : '▲';
}


// ── MICRO CATEGORY DETAIL ──
function openMicroCatDetail(catKey) {
  const catCfg = MICRO_CATS.find(c => c.key === catKey);
  if (!catCfg) return;
  const tasks = (window._microTasks||[]).filter(t => t.cat === catKey);

  const modal = document.getElementById('mesoModal');
  document.getElementById('mesoModalIcon').textContent = catCfg.icon;
  document.getElementById('mesoModalTitle').textContent = catCfg.label;
  document.getElementById('mesoModalSubtabs').style.display = 'none';

  document.getElementById('mesoModalBody').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <div style="font-size:13px;color:var(--muted);">共 ${tasks.length} 个点位</div>
      <button onclick="addMicroTaskCat('${catKey}');document.getElementById('mesoModal').classList.remove('open')"
        style="padding:6px 14px;border-radius:8px;background:${catCfg.color}18;color:${catCfg.color};border:1px solid ${catCfg.color}40;font-size:12px;cursor:pointer;font-family:'Noto Sans SC',sans-serif;">
        ＋ 添加${catCfg.label}
      </button>
    </div>
    ${tasks.length === 0 ? `<div style="text-align:center;padding:40px;color:var(--muted);font-size:13px;">暂无点位，点击上方按钮添加</div>` :
      tasks.map((t,i) => `
        <div style="background:var(--bg);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;">
          <div style="padding:12px 14px;display:flex;align-items:center;gap:10px;background:var(--white);border-bottom:1px solid var(--border);">
            <div style="width:26px;height:26px;border-radius:50%;background:${catCfg.color};color:#fff;display:grid;place-items:center;font-size:11px;font-weight:700;flex-shrink:0;">${i+1}</div>
            <div contenteditable="true" style="flex:1;font-size:13px;font-weight:600;outline:none;">${t.name}</div>
            ${t.lat ? `<span style="font-size:10px;color:${catCfg.color};background:${catCfg.color}15;padding:2px 8px;border-radius:10px;">📍 已标注</span>` : `<span style="font-size:10px;color:var(--muted);">未标注</span>`}
            <button onclick="deleteMicroTask('${t.id}');openMicroCatDetail('${catKey}')"
              style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:0 4px;">×</button>
          </div>
          <div style="padding:12px 14px;display:grid;grid-template-columns:1fr 1fr;gap:10px;">
            <div>
              <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;">主题</div>
              <div contenteditable="true" style="font-size:12px;padding:8px 10px;background:var(--white);border:1px solid var(--border);border-radius:8px;outline:none;min-height:36px;line-height:1.6;"
                oninput="updateMicroTask('${t.id}','theme',this.innerText)">${t.theme||''}</div>
            </div>
            <div>
              <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;">功能</div>
              <div contenteditable="true" style="font-size:12px;padding:8px 10px;background:var(--white);border:1px solid var(--border);border-radius:8px;outline:none;min-height:36px;line-height:1.6;"
                oninput="updateMicroTask('${t.id}','func',this.innerText)">${t.func||''}</div>
            </div>
            <div style="grid-column:1/-1;">
              <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;">注意事项</div>
              <div contenteditable="true" style="font-size:12px;padding:8px 10px;background:var(--white);border:1px solid var(--border);border-radius:8px;outline:none;min-height:48px;line-height:1.6;"
                oninput="updateMicroTask('${t.id}','notes',this.innerText)">${t.notes||''}</div>
            </div>
            <div style="grid-column:1/-1;">
              <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;">位置</div>
              <input type="text" value="${t.address||''}" placeholder="如：南侧主入口处"
                oninput="updateMicroTask('${t.id}','address',this.value)"
                style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:12px;font-family:'Noto Sans SC',sans-serif;outline:none;">
            </div>
          </div>
        </div>`).join('')}`;

  modal.classList.add('open');
}

function updateMicroTask(id, field, val) {
  const t = (window._microTasks||[]).find(t => String(t.id) === String(id));
  if (t) t[field] = val;
}

// Re-render micro card grid counts after map marking
const _origRenderMicroTasks = renderMicroTasks;
function renderMicroTasks() {
  _origRenderMicroTasks && _origRenderMicroTasks();
  // Update card grid counts
  const grid = document.getElementById('microCardGrid');
  if (!grid) return;
  MICRO_CATS.forEach(cat => {
    const tasks = (window._microTasks||[]).filter(t=>t.cat===cat.key);
    const cards = grid.querySelectorAll('.sys-card');
    cards.forEach(card => {
      const nameEl = card.querySelector('.sys-card-name');
      if (nameEl && nameEl.textContent === cat.label) {
        const cur = card.querySelector('.sys-card-cur');
        if (cur) cur.textContent = tasks.length + ' 个点位' + (tasks.filter(t=>t.lat).length ? ' · ' + tasks.filter(t=>t.lat).length + '已标注' : '');
      }
    });
  });
}

function deleteMicroTask(id) {
  window._microTasks = window._microTasks.filter(t => String(t.id) !== String(id));
  const m = _markers.find(m => String(m.id) === String(id));
  if (m) { _microMap?.removeLayer(m.marker); _markers = _markers.filter(x => String(x.id) !== String(id)); }
  renderMicroTasks();
}

function addMicroTaskCat(cat) {
  const catCfg = MICRO_CATS.find(c => c.key === cat);
  const num = (window._microTasks||[]).filter(t=>t.cat===cat).length + 1;
  const task = { id:Date.now(), cat, name:`${catCfg.label}${num}`, theme:'', func:'', notes:'', lat:null, lng:null, address:'' };
  if (!window._microTasks) window._microTasks = [];
  window._microTasks.push(task);
  renderMicroTasks();
  // Switch to mark mode for this category
  const sel = document.getElementById('markingCat');
  if (sel) sel.value = cat;
  setMarkMode(true);
  notify(`✅ 已添加${catCfg.label}${num}，请在地图上点击标注位置`);
}

// Init map when micro tab is shown
const _origSwitchRTab = switchRTab;
function switchRTab(tab) {
  _origSwitchRTab(tab);
  if (tab === 'micro') {
    setTimeout(() => {
      initMicroMap();
      renderMicroTasks();
      if (_microMap) _microMap.invalidateSize();
    }, 100);
  }
}

function delay(ms) { return new Promise(r=>setTimeout(r,ms)); }
function notify(msg) { const el=document.getElementById('notif'); el.textContent=msg; el.classList.add('show'); clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),2800); }
</script>

<!-- MESO DETAIL MODAL -->
<div class="meso-modal" id="mesoModal" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="meso-modal-box">
    <div class="meso-modal-hd">
      <div class="meso-modal-icon" id="mesoModalIcon">📌</div>
      <div class="meso-modal-title" id="mesoModalTitle"></div>
      <button class="meso-modal-close" onclick="document.getElementById('mesoModal').classList.remove('open')">✕</button>
    </div>
    <div id="mesoModalSubtabs" class="meso-subtabs" style="display:none;"></div>
    <div class="meso-modal-body" id="mesoModalBody"></div>
  </div>
</div>

</body>
</html>
