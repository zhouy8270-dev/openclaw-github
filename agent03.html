<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeighborMind · 智能体03 · 策略框架</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f6fb;--white:#fff;--border:#e4e9f2;--text:#1a2235;--muted:#7a8aa0;
  --accent:#1d4ed8;--al:#eff4ff;
  --green:#059669;--gl:#ecfdf5;
  --orange:#d97706;--ol:#fffbeb;
  --red:#dc2626;--rl:#fef2f2;
  --purple:#7c3aed;--pl:#f5f3ff;
  --sky:#0284c7;--skyl:#f0f9ff;
  --shadow:0 2px 12px rgba(0,0,0,0.07);
  --shadow-lg:0 8px 32px rgba(0,0,0,0.12);
  --r:14px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* TOP BAR */
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.logo{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;display:flex;align-items:center;gap:8px;}
.logo em{color:var(--accent);font-style:normal;}
.page-tag{font-size:13px;font-weight:500;display:flex;align-items:center;gap:7px;margin-left:12px;padding-left:12px;border-left:1px solid var(--border);}
.chip{font-size:11px;padding:3px 8px;border-radius:6px;font-weight:500;background:var(--al);color:var(--accent);}
.topbar-r{display:flex;gap:8px;}
.btn{padding:7px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-family:'Noto Sans SC',sans-serif;font-weight:500;display:flex;align-items:center;gap:5px;transition:all 0.15s;border:none;}
.btn-ghost{border:1px solid var(--border)!important;background:var(--white);color:var(--muted);}
.btn-ghost:hover{color:var(--text);background:var(--bg);}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{opacity:0.88;}
.btn-primary:disabled{opacity:0.4;cursor:not-allowed;}

/* LAYOUT */
.layout{flex:1;display:grid;grid-template-columns:280px 1fr;overflow:hidden;}

/* LEFT */
.left{background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;}
.left-body{flex:1;overflow-y:auto;padding:16px;}
.left-body::-webkit-scrollbar{width:4px;}
.left-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
.left-foot{padding:14px 16px;border-top:1px solid var(--border);flex-shrink:0;}

.upload-card{border:2px dashed var(--border);border-radius:10px;padding:14px;text-align:center;cursor:pointer;transition:all 0.2s;display:flex;flex-direction:column;align-items:center;gap:4px;}
.upload-card:hover{border-color:var(--accent);background:var(--al);}
.upload-card.over{border-color:var(--accent);background:var(--al);}
.uc-icon{font-size:22px;}
.uc-title{font-size:12px;font-weight:600;color:var(--text);}
.uc-types{font-size:10px;color:var(--muted);}
.file-tags{display:flex;flex-direction:column;gap:4px;margin-top:6px;}
.ftag{display:flex;align-items:center;gap:6px;padding:4px 8px;border-radius:7px;background:var(--bg);border:1px solid var(--border);font-size:11px;}
.ftag-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ftag-del{background:none;border:none;cursor:pointer;color:var(--muted);font-size:12px;}
.field-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin:12px 0 5px;}
.field-textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:12px;font-family:'Noto Sans SC',sans-serif;resize:none;height:68px;outline:none;color:var(--text);line-height:1.6;transition:border-color 0.15s;}
.field-textarea:focus{border-color:var(--accent);}
.agent01-box{background:var(--gl);border:1px solid rgba(5,150,105,0.15);border-radius:10px;padding:12px;margin-top:12px;font-size:12px;line-height:1.7;color:var(--text);}
.agent01-empty{font-style:italic;color:var(--muted);}

.gen-btn{width:100%;padding:12px;border-radius:11px;background:linear-gradient(135deg,var(--accent),#4f46e5);color:#fff;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans SC',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.15s;}
.gen-btn:hover{opacity:0.9;transform:translateY(-1px);}
.gen-btn:disabled{opacity:0.45;cursor:not-allowed;transform:none;}
.ip-bar{display:flex;gap:3px;margin-bottom:8px;}
.ip-seg{flex:1;height:3px;border-radius:3px;background:var(--border);transition:background 0.3s;}
.ip-seg.on{background:var(--green);}
.ip-lbl{font-size:10px;color:var(--muted);margin-bottom:4px;}

/* RIGHT */
.right{display:flex;flex-direction:column;overflow:hidden;}
.right-head{background:var(--white);border-bottom:1px solid var(--border);flex-shrink:0;}
.right-title-row{padding:12px 24px;display:flex;align-items:center;justify-content:space-between;}
.fw-status{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;}
.tabs{display:flex;padding:0 24px;}
.tab{padding:10px 18px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;color:var(--muted);font-weight:500;transition:all 0.15s;white-space:nowrap;user-select:none;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.right-scroll{flex:1;overflow-y:auto;padding:24px;}
.right-scroll::-webkit-scrollbar{width:5px;}
.right-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:5px;}

/* EMPTY */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;color:var(--muted);}
.empty-icon{font-size:52px;opacity:0.2;}
.empty h3{font-size:15px;font-weight:600;color:var(--text);opacity:0.4;}
.empty p{font-size:13px;text-align:center;line-height:1.7;max-width:300px;}

/* PROGRESS */
.prog-wrap{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:28px;max-width:480px;margin:60px auto;box-shadow:var(--shadow);}
.prog-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.prog-bar{height:5px;background:var(--border);border-radius:5px;overflow:hidden;margin-bottom:14px;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),#4f46e5);border-radius:5px;transition:width 0.5s ease;width:0%;}
.prog-step{font-size:13px;color:var(--muted);}

/* ── CARD GRID (shared by macro/meso/micro) ── */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;}
.fw-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:18px 14px;text-align:center;cursor:pointer;transition:all 0.2s;position:relative;animation:up 0.35s ease forwards;opacity:0;}
.fw-card:hover{box-shadow:var(--shadow);transform:translateY(-2px);border-color:#c8d4e8;}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fw-card-icon{width:52px;height:52px;border-radius:14px;display:grid;place-items:center;font-size:26px;margin:0 auto 10px;}
.fw-card-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;margin-bottom:4px;}
.fw-card-sub{font-size:11px;color:var(--muted);line-height:1.5;margin-bottom:8px;}
.fw-card-arrow{font-size:11px;color:var(--accent);font-weight:500;}
.fw-card-del{position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:50%;background:rgba(220,38,38,0.1);color:var(--red);border:none;cursor:pointer;font-size:13px;display:grid;place-items:center;opacity:0;transition:opacity 0.15s;}
.fw-card:hover .fw-card-del{opacity:1;}
.fw-card-add{border:2px dashed var(--border);background:none;cursor:pointer;}
.fw-card-add:hover{border-color:var(--accent);background:var(--al);}

/* ── MACRO SECTION BLOCKS ── */
.mac-block{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:20px 22px;margin-bottom:14px;animation:up 0.35s ease forwards;opacity:0;}
.mac-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.mac-label .mac-del{background:none;border:none;cursor:pointer;color:var(--muted);font-size:13px;padding:0 4px;opacity:0;}
.mac-block:hover .mac-del{opacity:1;}
.mac-del:hover{color:var(--red);}
.editable{font-size:13px;line-height:1.85;color:var(--text);outline:none;border-radius:8px;padding:6px 8px;border:1px solid transparent;transition:all 0.15s;min-height:36px;width:100%;}
.editable:hover{border-color:var(--border);background:var(--bg);}
.editable:focus{border-color:var(--accent);background:var(--white);}
.editable[placeholder]:empty::before{content:attr(placeholder);color:var(--muted);font-style:italic;}
.principles-row{display:flex;flex-wrap:wrap;gap:8px;}
.principle-tag{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid;outline:none;cursor:default;}

/* ── CHAT BOX ── */
.chat-area{margin-top:12px;padding-top:12px;border-top:1px dashed var(--border);}
.chat-row{display:flex;gap:8px;}
.chat-inp{flex:1;padding:8px 11px;border:1px solid var(--border);border-radius:8px;font-size:12px;font-family:'Noto Sans SC',sans-serif;outline:none;resize:none;height:36px;color:var(--text);transition:all 0.15s;line-height:1.5;}
.chat-inp:focus{border-color:var(--accent);height:64px;}
.chat-inp::placeholder{color:var(--muted);}
.chat-btn{padding:8px 14px;border-radius:8px;background:var(--accent);color:#fff;border:none;font-size:12px;cursor:pointer;font-family:'Noto Sans SC',sans-serif;font-weight:500;white-space:nowrap;flex-shrink:0;transition:opacity 0.15s;}
.chat-btn:hover{opacity:0.88;}
.chat-btn:disabled{opacity:0.4;cursor:not-allowed;}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.45);backdrop-filter:blur(5px);display:none;place-items:center;}
.modal-overlay.open{display:grid;}
.modal-box{background:var(--bg);border-radius:20px;width:95%;max-width:860px;max-height:92vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--shadow-lg);animation:mIn 0.22s ease;}
@keyframes mIn{from{opacity:0;transform:scale(0.96)}to{opacity:1;transform:scale(1)}}
.modal-hd{background:var(--white);padding:16px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;}
.modal-icon{font-size:26px;width:42px;height:42px;border-radius:10px;display:grid;place-items:center;}
.modal-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;flex:1;}
.modal-close{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:none;cursor:pointer;font-size:16px;color:var(--muted);display:grid;place-items:center;}
.modal-subtabs{background:var(--white);border-bottom:1px solid var(--border);padding:0 22px;display:flex;gap:0;flex-shrink:0;}
.subtab{padding:9px 16px;font-size:12px;cursor:pointer;border-bottom:2px solid transparent;color:var(--muted);font-weight:500;transition:all 0.15s;}
.subtab:hover{color:var(--text);}
.subtab.active{color:var(--accent);border-bottom-color:var(--accent);}
.modal-body{overflow-y:auto;padding:20px 22px;flex:1;}
.modal-body::-webkit-scrollbar{width:5px;}
.modal-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:5px;}

/* ── DIAGRAM PAIR ── */
.diagram-pair{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.diagram-pair.single{grid-template-columns:1fr;}
.d-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px;}
.d-img{background:var(--bg);border:2px dashed var(--border);border-radius:12px;aspect-ratio:4/3;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;transition:all 0.2s;overflow:hidden;}
.d-img:hover{border-color:var(--accent);background:var(--al);}
.d-img img{width:100%;height:100%;object-fit:cover;border-radius:10px;}
.d-desc{font-size:12px;line-height:1.7;color:var(--text);padding:9px 11px;background:var(--bg);border-radius:9px;outline:none;min-height:56px;border:1px solid transparent;transition:all 0.15s;}
.d-desc:hover{border-color:var(--border);background:var(--white);}
.d-desc:focus{border-color:var(--accent);background:var(--white);}
.data-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.data-chip{background:var(--white);border:1px solid var(--border);border-radius:9px;padding:9px 13px;min-width:90px;}
.dc-label{font-size:10px;color:var(--muted);font-weight:600;margin-bottom:2px;}
.dc-val{font-size:18px;font-weight:700;font-family:'Syne',sans-serif;outline:none;}
.dc-unit{font-size:10px;color:var(--muted);}

/* ── MICRO TASK in modal ── */
.micro-item{background:var(--white);border:1px solid var(--border);border-radius:11px;margin-bottom:8px;overflow:hidden;}
.micro-item-hd{padding:11px 14px;display:flex;align-items:center;gap:9px;cursor:pointer;}
.micro-item-hd:hover{background:var(--bg);}
.micro-num{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0;}
.micro-name{flex:1;font-size:13px;font-weight:600;outline:none;}
.micro-name:focus{background:var(--bg);border-radius:4px;padding:1px 4px;}
.micro-located{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:500;}
.micro-chev{color:var(--muted);font-size:11px;transition:transform 0.2s;flex-shrink:0;}
.micro-chev.open{transform:rotate(180deg);}
.micro-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:0 3px;}
.micro-del:hover{color:var(--red);}
.micro-body{padding:12px 14px;border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.micro-field{}
.mf-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:4px;}
.mf-val{font-size:12px;padding:7px 9px;background:var(--bg);border-radius:7px;outline:none;min-height:32px;line-height:1.6;border:1px solid transparent;transition:all 0.15s;}
.mf-val:hover{border-color:var(--border);background:var(--white);}
.mf-val:focus{border-color:var(--accent);background:var(--white);}
.mf-val[placeholder]:empty::before{content:attr(placeholder);color:var(--muted);font-style:italic;}
.mf-input{width:100%;padding:7px 9px;border:1px solid var(--border);border-radius:7px;font-size:12px;font-family:'Noto Sans SC',sans-serif;outline:none;background:var(--white);}
.mf-input:focus{border-color:var(--accent);}
.micro-full{grid-column:1/-1;}

/* ── MAP (micro) ── */
#microMap{height:280px;border-radius:10px;overflow:hidden;border:1px solid var(--border);}

.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,0.25);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;}
.spin-b{display:inline-block;width:12px;height:12px;border:2px solid rgba(29,78,216,0.15);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
.notif{position:fixed;bottom:20px;right:24px;background:var(--text);color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;box-shadow:var(--shadow-lg);transform:translateY(16px);opacity:0;transition:all 0.25s;z-index:500;}
.notif.show{transform:translateY(0);opacity:1;}
input[type=file]{display:none;}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div style="display:flex;align-items:center;">
    <div class="logo">🏘 Neighbor<em>Mind</em></div>
    <div class="page-tag">🧭 策略框架生成 <span class="chip">智能体 03</span></div>
  </div>
  <div class="topbar-r">
    <button class="btn btn-ghost" onclick="window.print()" id="pdfBtn" style="display:none;">📄 导出PDF</button>
    <button class="btn btn-ghost" onclick="resetAll()">↺ 重置</button>
  </div>
</div>

<div class="layout">

  <!-- LEFT -->
  <div class="left">
    <div class="left-body">

      <!-- 规划资料 & 政策资料 side by side -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;">
        <div>
          <div style="font-family:'Syne',sans-serif;font-size:12px;font-weight:800;color:var(--accent);margin-bottom:6px;">🗺 规划资料</div>
          <div class="upload-card" onclick="document.getElementById('fi-planning').click()" ondragover="dzOver(event,'planning')" ondragleave="dzOut('planning')" ondrop="dzDrop(event,'planning')" id="dz-planning">
            <div class="uc-icon">📎</div>
            <div class="uc-title" style="font-size:11px;">点击上传</div>
            <div class="uc-types">PDF·DOCX·TXT</div>
          </div>
          <input type="file" id="fi-planning" accept=".pdf,.docx,.doc,.txt" multiple onchange="handleUpload('planning',this)">
          <div class="file-tags" id="ft-planning"></div>
        </div>
        <div>
          <div style="font-family:'Syne',sans-serif;font-size:12px;font-weight:800;color:var(--purple);margin-bottom:6px;">📜 政策资料</div>
          <div class="upload-card" onclick="document.getElementById('fi-policy').click()" ondragover="dzOver(event,'policy')" ondragleave="dzOut('policy')" ondrop="dzDrop(event,'policy')" id="dz-policy">
            <div class="uc-icon">📎</div>
            <div class="uc-title" style="font-size:11px;">点击上传</div>
            <div class="uc-types">PDF·DOCX·TXT</div>
          </div>
          <input type="file" id="fi-policy" accept=".pdf,.docx,.doc,.txt" multiple onchange="handleUpload('policy',this)">
          <div class="file-tags" id="ft-policy"></div>
        </div>
      </div>

      <div class="field-label">或直接填写规划要点</div>
      <textarea class="field-textarea" id="f-planning" placeholder="总规要求、控规指标、街区更新要点…" oninput="markFilled('planning')"></textarea>

      <div class="field-label">或直接填写政策要点</div>
      <textarea class="field-textarea" id="f-policy" placeholder="相关政策、可申请资金、约束条件…" oninput="markFilled('policy')"></textarea>

      <div class="field-label">从智能体01读取</div>
      <div class="agent01-box" id="agent01Box">
        <span class="agent01-empty" id="agent01Empty">暂未检测到智能体01数据</span>
        <div id="agent01Content" style="display:none;"></div>
      </div>

    </div>
    <div class="left-foot">
      <div class="ip-lbl" id="ipLbl">已上传 0 / 2 类</div>
      <div class="ip-bar">
        <div class="ip-seg" id="ips-planning"></div>
        <div class="ip-seg" id="ips-policy"></div>
      </div>
      <button class="gen-btn" id="genBtn" onclick="generate()">🤖 生成策略框架</button>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="right-head">
      <div class="right-title-row">
        <div style="display:flex;align-items:center;gap:10px;">
          <div style="font-family:'Syne',sans-serif;font-size:14px;font-weight:800;">策略框架</div>
          <div class="fw-status" id="fwStatus">
            <span style="width:7px;height:7px;border-radius:50%;background:var(--border);display:inline-block;"></span>
            等待生成
          </div>
        </div>
        <button class="btn btn-ghost" id="pdfBtn2" onclick="window.print()" style="display:none;">📄 导出PDF</button>
      </div>
      <div class="tabs" id="tabBar" style="display:none;">
        <div class="tab active" id="tab-macro" onclick="switchTab('macro')">🌐 宏观战略</div>
        <div class="tab" id="tab-meso" onclick="switchTab('meso')">🔲 中观系统</div>
        <div class="tab" id="tab-micro" onclick="switchTab('micro')">🔍 微观任务书</div>
      </div>
    </div>

    <div class="right-scroll" id="rightScroll">
      <div class="empty" id="emptyState">
        <div class="empty-icon">🧭</div>
        <h3>策略框架待生成</h3>
        <p>上传规划资料和政策文件，或直接填写要点，点击「生成策略框架」开始</p>
      </div>
      <div id="panel-macro" style="display:none;"></div>
      <div id="panel-meso" style="display:none;"></div>
      <div id="panel-micro" style="display:none;"></div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="modal-hd">

}
function removeFile(sec, i) { uploadedFiles[sec].splice(i,1); renderFileTags(sec); }

function guessMicroCat(cat) {
  if (cat.includes('大门')) return 'gate';
  if (cat.includes('大型')) return 'major';
  if (cat.includes('道路')) return 'road';
  if (cat.includes('停车')&&cat.includes('机动')) return 'carpark';
  if (cat.includes('停车')) return 'bikepark';
  if (cat.includes('垃圾')) return 'trash';
  return 'node';
}

async function callClaude(prompt) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:1000, messages:[{role:'user',content:prompt}] })
  });
  const d = await res.json();
  const txt = d.content?.[0]?.text||'';
  return JSON.parse(txt.replace(/```json|```/g,'').trim());
}

function renderMacro() {
  const m = fwData?.macro;
  if (!m) return;
  const necessity = Array.isArray(m.necessity) ? m.necessity : [m.necessity];
  const significance = Array.isArray(m.significance) ? m.significance : [m.significance];

  document.getElementById('panel-macro').innerHTML = `
    ${macBlock('定位','🎯','positioning', `<div class="editable" contenteditable="true" id="mac-positioning">${m.positioning||''}</div>`, '对定位有什么修改意见？')}
    ${macBlock('愿景目标','🌟','vision', `<div class="editable" contenteditable="true" id="mac-vision" style="font-size:15px;font-weight:600;color:var(--accent);">${m.vision||''}</div>`, '对愿景有什么修改意见？')}
    ${macBlock('项目必要性','📌','necessity', necessity.map((n,i)=>`<div class="editable" contenteditable="true" id="mac-necessity-${i}">• ${n}</div>`).join(''), '对必要性有什么修改意见？')}
    ${macBlock('项目意义','✨','significance', significance.map((s,i)=>`<div class="editable" contenteditable="true" id="mac-significance-${i}">• ${s}</div>`).join(''), '对意义有什么修改意见？')}
    ${macBlock('设计原则','🧭','principles', `<div class="principles-row">${(m.principles||[]).map((p,i)=>`<div class="principle-tag" contenteditable="true" id="mac-principle-${i}" style="background:${p.color}18;color:${p.color};border-color:${p.color}40;">${p.name}</div>`).join('')}</div>`, '对设计原则有什么修改意见？')}
  `;
}

function macBlock(label, icon, key, bodyHTML, placeholder) {
  return `<div class="mac-block" style="animation-delay:${['positioning','vision','necessity','significance','principles'].indexOf(key)*0.07}s;">
    <div class="mac-label">${icon} ${label}
      <button class="mac-del" onclick="this.closest('.mac-block').remove()">×</button>
    </div>
    ${bodyHTML}
    <div class="chat-area">
      <div class="chat-row">
        <textarea class="chat-inp" id="ci-${key}" placeholder="${placeholder}"></textarea>
        <button class="chat-btn" onclick="refineItem('${key}')">✨ 修改</button>
      </div>
    </div>
  </div>`;
}

async function refineItem(key) {
  const inp = document.getElementById('ci-'+key);
  const btn = inp?.nextElementSibling;
  if (!inp||!btn) return;
  const fb = inp.value.trim();
  if (!fb) { notify('请填写修改意见'); return; }
  btn.disabled=true; btn.innerHTML='<div class="spin"></div>';
  try {
    const cur = document.querySelectorAll(`[id^="mac-${key}"]`);
    const curText = Array.from(cur).map(e=>e.innerText).join('\n');
    const res = await callClaude(`当前内容：「${curText}」\n修改意见：「${fb}」\n请直接输出修改后的内容，格式与原来一致，不要解释。`);
    const text = typeof res === 'string' ? res : JSON.stringify(res);
    if (cur.length === 1) { cur[0].innerText = text; }
    else { const lines=text.split('\n').filter(l=>l.trim()); cur.forEach((el,i)=>{ if(lines[i]) el.innerText='• '+lines[i].replace(/^[•\-\d\.]+\s*/,''); }); }
    inp.value=''; notify('✅ 已修改');
  } catch(e) { notify('⚠️ 修改失败'); }
  btn.disabled=false; btn.innerHTML='✨ 修改';
}

  document.getElementById('panel-meso').innerHTML = `
    <div class="card-grid" id="mesoGrid">
      ${mesoActiveSystems.map((sys,i) => `
        <div class="fw-card" style="animation-delay:${i*0.06}s;" onclick="openMesoDetail(${i})">
          <button class="fw-card-del" onclick="event.stopPropagation();deleteMesoSys(${i})">×</button>
          <div class="fw-card-icon" style="background:${sys.bg}">${sys.icon}</div>
          <div class="fw-card-name" style="color:${sys.color}">${sys.name}</div>
          <div class="fw-card-sub">${sys.current||sys.strategy||'点击查看详情'}</div>
          <div class="fw-card-arrow">→ 查看详情</div>
        </div>`).join('')}
      ${available.length ? `
        <div class="fw-card fw-card-add" onclick="showAddMeso()">
          <div style="font-size:28px;margin-bottom:8px;">＋</div>

}

  if (!available.length) { notify('没有更多可添加的系统'); return; }
  const choice = prompt(available.map((e,i)=>`${i+1}. ${e.icon} ${e.name}`).join('\n')+'\n\n输入序号：');
  const idx = parseInt(choice)-1;
  if (idx>=0 && idx<available.length) {
    mesoActiveSystems.push({...available[idx], current:'', strategy:''});
    renderMeso();
    notify(`✅ 已添加${available[idx].name}`);
  }
}

function openMesoDetail(i) {
  const sys = mesoActiveSystems[i];
  document.getElementById('modalIcon').textContent = sys.icon;
  document.getElementById('modalIcon').style.background = sys.bg;
  document.getElementById('modalTitle').textContent = sys.name;

  const subtabsEl = document.getElementById('modalSubtabs');
  const bodyEl = document.getElementById('modalBody');

  if (sys.type === 'subtabs') {
    subtabsEl.style.display = 'flex';
    subtabsEl.innerHTML = sys.subtabs.map((st,si)=>
      `<div class="subtab ${si===0?'active':''}" id="stab-${si}" onclick="switchMesoSubtab(${i},${si})">${st.icon} ${st.label}</div>`
    ).join('');
    renderMesoBody(sys.subtabs[0], bodyEl, sys, i, 0);
  } else {
    subtabsEl.style.display = 'none';
    renderMesoBody(sys, bodyEl, sys, i, -1);
  }

  document.getElementById('modal').classList.add('open');
}

function switchMesoSubtab(sysIdx, tabIdx) {
  document.querySelectorAll('.subtab').forEach((t,i)=>t.classList.toggle('active',i===tabIdx));
  const sys = mesoActiveSystems[sysIdx];
  renderMesoBody(sys.subtabs[tabIdx], document.getElementById('modalBody'), sys, sysIdx, tabIdx);
}

function renderMesoBody(cfg, bodyEl, sys, sysIdx, tabIdx) {
  const chatKey = `meso-${sysIdx}-${tabIdx}`;
  if (cfg.type === 'nomap') {
    bodyEl.innerHTML = (cfg.fields||[]).map(f=>`
      <div class="mac-block">
        <div class="mac-label">${f.label}</div>
        <div class="editable" contenteditable="true" placeholder="${f.ph}">${sys[f.key]||''}</div>
      </div>`).join('') + chatAreaHTML(chatKey, `对${sys.name}有什么修改意见？`);
    return;
  }
  const isSingle = cfg.type === 'single';
  bodyEl.innerHTML = `
    <div class="diagram-pair ${isSingle?'single':''}">
      ${!isSingle ? `<div>
        <div class="d-label">${cfg.curLabel||'现状'}</div>
        <div class="d-img" onclick="uploadImg(this)">
          <div style="text-align:center;color:var(--muted);">
            <div style="font-size:28px;margin-bottom:4px;">📷</div>
            <div style="font-size:12px;">上传现状图</div>
            <div style="font-size:10px;opacity:0.6;">后期接入生图</div>
          </div>
        </div>
        <div class="d-desc" contenteditable="true" placeholder="${cfg.curDesc||'现状说明…'}">${sys.current||''}</div>
      </div>` : ''}
      <div>
        <div class="d-label">${cfg.planLabel||'规划'}</div>
        <div class="d-img" onclick="uploadImg(this)">
          <div style="text-align:center;color:var(--muted);">
            <div style="font-size:28px;margin-bottom:4px;">🗺</div>
            <div style="font-size:12px;">上传规划图</div>
            <div style="font-size:10px;opacity:0.6;">后期接入生图</div>
          </div>
        </div>
        <div class="d-desc" contenteditable="true" placeholder="${cfg.planDesc||'规划说明…'}">${sys.strategy||''}</div>
      </div>
    </div>
    ${cfg.data&&cfg.data.length ? `<div class="data-chips">${cfg.data.map(d=>`
      <div class="data-chip">
        <div class="dc-label">${d.label}</div>
        <div class="dc-val" contenteditable="true">-</div>
        <div class="dc-unit">${d.unit}</div>
      </div>`).join('')}</div>` : ''}
    ${chatAreaHTML(chatKey, `对${sys.name}有什么修改意见？`)}`;
}

function chatAreaHTML(key, placeholder) {
  return `<div class="chat-area">
    <div class="chat-row">
      <textarea class="chat-inp" id="ci-${key}" placeholder="${placeholder}"></textarea>
      <button class="chat-btn" onclick="refineMeso('${key}')">✨ 修改</button>
    </div>
  </div>`;
}

async function refineMeso(key) {
  const inp = document.getElementById('ci-'+key);
  const btn = inp?.nextElementSibling;
  if (!inp||!btn) return;
  const fb = inp.value.trim();
  if (!fb) { notify('请填写修改意见'); return; }
  btn.disabled=true; btn.innerHTML='<div class="spin"></div>';
  try {
    const parts = key.split('-');
    const sysIdx = parseInt(parts[1]);
    const sys = mesoActiveSystems[sysIdx];
    const res = await callClaude(`当前${sys.name}：现状「${sys.current}」，策略「${sys.strategy}」\n意见：「${fb}」\n只返回JSON：{"current":"修改后","strategy":"修改后"}`);
    if (res.current) sys.current=res.current;
    if (res.strategy) sys.strategy=res.strategy;
    openMesoDetail(sysIdx);
    notify('✅ 已修改');
  } catch(e) { notify('⚠️ 修改失败'); }
  btn.disabled=false; btn.innerHTML='✨ 修改';
}

function uploadImg(el) {
  const inp = document.createElement('input');
  inp.type='file'; inp.accept='image/*';
  inp.onchange = e => {
    const f = e.target.files[0];
    if (!f) return;
    el.innerHTML = `<img src="${URL.createObjectURL(f)}">`;
  };
  inp.click();
}

// ══════════════════════════════
// MICRO
// ══════════════════════════════
function renderMicro() {
  document.getElementById('panel-micro').innerHTML = `
    <div class="card-grid" id="microGrid" style="margin-bottom:20px;">
      ${MICRO_CATS.map((cat,i) => {
        const tasks = microTasks.filter(t=>t.cat===cat.key);
        return `<div class="fw-card" style="animation-delay:${i*0.06}s;" onclick="openMicroCat('${cat.key}')">
          <div class="fw-card-icon" style="background:${cat.color}18">${cat.icon}</div>
          <div class="fw-card-name" style="color:${cat.color}">${cat.label}</div>
          <div class="fw-card-sub">${tasks.length} 个点位${tasks.filter(t=>t.lat).length?' · '+tasks.filter(t=>t.lat).length+'已标注':''}</div>
          <div class="fw-card-arrow">→ 查看 / 添加</div>
        </div>`;
      }).join('')}
    </div>
    <div style="background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;">
      <div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;">
        <div style="font-family:'Syne',sans-serif;font-size:13px;font-weight:700;">📍 点位标注地图</div>
        <div style="display:flex;gap:8px;align-items:center;">
          <select id="markCat" style="padding:5px 8px;border:1px solid var(--border);border-radius:7px;font-size:11px;outline:none;font-family:'Noto Sans SC',sans-serif;">
            ${MICRO_CATS.map(c=>`<option value="${c.key}">${c.icon} ${c.label}</option>`).join('')}
          </select>
          <button onclick="setMarkMode(true)" id="markBtn" style="padding:5px 14px;border-radius:7px;background:var(--accent);color:#fff;border:none;font-size:11px;cursor:pointer;font-family:'Noto Sans SC',sans-serif;">✚ 点击标注</button>
        </div>
      </div>
      <div id="microMap" style="height:300px;"></div>
    </div>`;
}

function openMicroCat(catKey) {
  const cat = MICRO_CATS.find(c=>c.key===catKey);
  const tasks = microTasks.filter(t=>t.cat===catKey);

  document.getElementById('modalIcon').textContent = cat.icon;
  document.getElementById('modalIcon').style.background = cat.color+'18';
  document.getElementById('modalTitle').textContent = cat.label;
  document.getElementById('modalSubtabs').style.display = 'none';

  document.getElementById('modalBody').innerHTML = `
    <div style="display:flex;justify-content:flex-end;margin-bottom:12px;">
      <button onclick="addMicroTask('${catKey}')"
        style="padding:7px 16px;border-radius:8px;background:${cat.color}18;color:${cat.color};border:1px solid ${cat.color}40;font-size:12px;cursor:pointer;font-family:'Noto Sans SC',sans-serif;font-weight:500;">
        ＋ 添加${cat.label}
      </button>
    </div>
    ${tasks.length===0 ? `<div style="text-align:center;padding:40px;color:var(--muted);font-size:13px;">暂无点位</div>` :
      tasks.map((t,i) => microItemHTML(t, i, cat)).join('')}`;

  document.getElementById('modal').classList.add('open');
}

function microItemHTML(t, i, cat) {
  return `<div class="micro-item" id="mi-${t.id}">
    <div class="micro-item-hd" onclick="toggleMicroItem('${t.id}')">
      <div class="micro-num" style="background:${cat.color}">${i+1}</div>
      <div class="micro-name" contenteditable="true" onclick="event.stopPropagation()">${t.name}</div>
      ${t.lat ? `<span class="micro-located" style="background:${cat.color}15;color:${cat.color};">📍 已标注</span>` : `<span style="font-size:10px;color:var(--muted);">未标注</span>`}
      <button class="micro-del" onclick="event.stopPropagation();deleteMicroTask('${t.id}','${cat.key}')">×</button>
      <span class="micro-chev" id="mchev-${t.id}">▼</span>
    </div>
    <div class="micro-body" id="mbody-${t.id}" style="display:none;">
      <div class="micro-field">
        <div class="mf-label">主题</div>
        <div class="mf-val" contenteditable="true" placeholder="主题定位…" oninput="updateMicro('${t.id}','theme',this.innerText)">${t.theme}</div>
      </div>
      <div class="micro-field">
        <div class="mf-label">功能</div>
        <div class="mf-val" contenteditable="true" placeholder="主要功能…" oninput="updateMicro('${t.id}','func',this.innerText)">${t.func}</div>
      </div>
      <div class="micro-field micro-full">
        <div class="mf-label">注意事项</div>
        <div class="mf-val" contenteditable="true" placeholder="设计约束、注意事项…" oninput="updateMicro('${t.id}','notes',this.innerText)">${t.notes}</div>
      </div>
      <div class="micro-field micro-full">
        <div class="mf-label">位置描述</div>
        <input class="mf-input" type="text" value="${t.address}" placeholder="如：南侧主入口大门处" oninput="updateMicro('${t.id}','address',this.value)">
      </div>
    </div>
  </div>`;
}

function toggleMicroItem(id) {
  const body = document.getElementById('mbody-'+id);
  const chev = document.getElementById('mchev-'+id);
  if (!body) return;
  const open = body.style.display!=='none';
  body.style.display = open?'none':'grid';
  if (chev) chev.classList.toggle('open',!open);
}

function addMicroTask(catKey) {
  const cat = MICRO_CATS.find(c=>c.key===catKey);
  const num = microTasks.filter(t=>t.cat===catKey).length+1;
  const t = {id:Date.now(),cat:catKey,name:`${cat.label}${num}`,theme:'',func:'',notes:'',lat:null,lng:null,address:''};
  microTasks.push(t);
  openMicroCat(catKey);
  renderMicro();
  notify(`✅ 已添加${cat.label}${num}`);
}

function deleteMicroTask(id, catKey) {
  microTasks = microTasks.filter(t=>String(t.id)!==String(id));
  const m = mapMarkers.find(m=>String(m.id)===String(id));
  if (m) { microMap?.removeLayer(m.marker); mapMarkers=mapMarkers.filter(x=>String(x.id)!==String(id)); }
  openMicroCat(catKey);
  renderMicro();
}

function updateMicro(id, field, val) {
  const t = microTasks.find(t=>String(t.id)===String(id));
  if (t) t[field]=val;
}

// ══════════════════════════════
// MAP
// ══════════════════════════════
function initMicroMap() {
  if (microMap) { microMap.invalidateSize(); return; }
  const el = document.getElementById('microMap');
  if (!el||typeof L==='undefined') return;
  microMap = L.map('microMap').setView([39.9042,116.4074],16);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OSM',maxZoom:19}).addTo(microMap);
  microMap.on('click', e => {
    if (!markMode) return;
    const catKey = document.getElementById('markCat')?.value||'node';
    const cat = MICRO_CATS.find(c=>c.key===catKey);
    const num = microTasks.filter(t=>t.cat===catKey).length+1;
    const name = prompt(`标注名称：`,`${cat.label}${num}`);
    if (!name) return;
    const t = {id:Date.now(),cat:catKey,name,theme:'',func:'',notes:'',lat:e.latlng.lat,lng:e.latlng.lng,address:`${e.latlng.lat.toFixed(5)},${e.latlng.lng.toFixed(5)}`};
    microTasks.push(t);
    addMapPin(t);
    renderMicro();
    setMarkMode(false);
    notify('✅ 已标注：'+name);
  });
  microTasks.filter(t=>t.lat).forEach(t=>addMapPin(t));
}

function addMapPin(t) {
  const cat = MICRO_CATS.find(c=>c.key===t.cat);
  const icon = L.divIcon({
    html:`<div style="background:${cat?.color||'#666'};color:#fff;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;box-shadow:0 2px 8px rgba(0,0,0,0.3);border:2px solid #fff;">${cat?.icon||'📍'}</div>`,
    className:'',iconSize:[28,28],iconAnchor:[14,14]
  });
  const marker = L.marker([t.lat,t.lng],{icon}).addTo(microMap).bindPopup(`<b>${t.name}</b>`);
  mapMarkers.push({id:t.id,marker});
}

function setMarkMode(on) {
  markMode=on;
  const btn=document.getElementById('markBtn');
  if (btn) { btn.textContent=on?'🎯 点击地图标注…':'✚ 点击标注'; btn.style.background=on?'#dc2626':'var(--accent)'; }
  if (microMap) microMap.getContainer().style.cursor=on?'crosshair':'';
}

// ══════════════════════════════
// TAB / MODAL / MISC
// ══════════════════════════════
function switchTab(tab) {
  currentTab=tab;
  ['macro','meso','micro'].forEach(t=>{
    document.getElementById('tab-'+t)?.classList.toggle('active',t===tab);
    document.getElementById('panel-'+t).style.display=t===tab?'block':'none';
  });
  if (tab==='micro') setTimeout(()=>{ initMicroMap(); if(microMap)microMap.invalidateSize(); },150);
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

function showProgress() {
  document.getElementById('emptyState').style.display='none';
  ['macro','meso','micro'].forEach(t=>{ document.getElementById('panel-'+t).style.display='none'; });
  document.getElementById('rightScroll').innerHTML = `
    <div class="prog-wrap">
      <div class="prog-title"><div class="spin-b" style="width:16px;height:16px;border-width:2.5px;"></div> AI 正在生成策略框架…</div>
      <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
      <div class="prog-step" id="progStep">初始化…</div>
    </div>`;
}

function setProg(txt, pct) {
  const f=document.getElementById('progFill'); if(f) f.style.width=pct+'%';
  const s=document.getElementById('progStep'); if(s) s.textContent=txt;
}

function restorePanels() {
  const scroll = document.getElementById('rightScroll');
  scroll.innerHTML = `
    <div id="emptyState" class="empty" style="display:none;"></div>
    <div id="panel-macro" style="display:none;"></div>
    <div id="panel-meso" style="display:none;"></div>
    <div id="panel-micro" style="display:none;"></div>`;
}

function resetAll() {
  if (!confirm('确认重置所有内容？')) return;
  fwData=null; mesoActiveSystems=[]; microTasks=[]; microMap=null; mapMarkers=[];
  document.getElementById('tabBar').style.display='none';
  document.getElementById('pdfBtn2').style.display='none';
  document.getElementById('fwStatus').innerHTML='<span style="width:7px;height:7px;border-radius:50%;background:var(--border);display:inline-block;"></span> 等待生成';
  restorePanels();
  document.getElementById('emptyState').style.display='flex';
  document.getElementById('genBtn').innerHTML='🤖 生成策略框架';
  document.getElementById('genBtn').disabled=false;
}

function delay(ms){return new Promise(r=>setTimeout(r,ms));}
function notify(msg){const el=document.getElementById('notif');el.textContent=msg;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2800);}
</script>
</body>
</html>
