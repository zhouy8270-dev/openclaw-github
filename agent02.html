<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeighborMind · 智能体02 · 社区问题诊断</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f7fa;
  --white: #fff;
  --border: #e4e9f0;
  --text: #1a2235;
  --muted: #7a8aa0;
  --accent: #1d4ed8;
  --accent-l: #eff4ff;
  --green: #059669;
  --green-l: #ecfdf5;
  --orange: #d97706;
  --orange-l: #fffbeb;
  --red: #dc2626;
  --red-l: #fef2f2;
  --purple: #7c3aed;
  --purple-l: #f5f3ff;
  --sky: #0284c7;
  --sky-l: #f0f9ff;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.1);
  --r: 14px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Noto Sans SC',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* ── TOP BAR ── */
.topbar {
  background:var(--white); border-bottom:1px solid var(--border);
  padding:0 40px; height:58px;
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:50;
}
.topbar-left { display:flex; align-items:center; gap:12px; }
.logo { font-family:'Syne',sans-serif; font-size:15px; font-weight:800; display:flex; align-items:center; gap:8px; }
.logo span { color:var(--accent); }
.sep { width:1px; height:18px; background:var(--border); }
.page-title { font-size:14px; font-weight:500; display:flex; align-items:center; gap:8px; }
.agent-tag { background:var(--accent-l); color:var(--accent); font-size:11px; padding:3px 8px; border-radius:6px; font-weight:500; }
.topbar-right { display:flex; gap:10px; }
.btn {
  padding:8px 18px; border-radius:9px; font-size:13px; cursor:pointer;
  font-family:'Noto Sans SC',sans-serif; font-weight:500; transition:all 0.15s;
  display:flex; align-items:center; gap:6px;
}
.btn-outline { border:1px solid var(--border); background:var(--white); color:var(--text); }
.btn-outline:hover { background:var(--bg); }
.btn-primary { background:var(--accent); color:#fff; border:none; }
.btn-primary:hover { opacity:0.88; }
.btn-green { background:var(--green); color:#fff; border:none; }
.btn-green:hover { opacity:0.88; }

/* ── LAYOUT ── */
.layout { display:grid; grid-template-columns:300px 1fr; min-height:calc(100vh - 58px); }

/* ── LEFT PANEL ── */
.left { background:var(--white); border-right:1px solid var(--border); padding:24px 20px; display:flex; flex-direction:column; gap:20px; overflow-y:auto; }

.panel-section { display:flex; flex-direction:column; gap:10px; }
.panel-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); }

/* Upload zone */
.upload-zone {
  border:2px dashed var(--border); border-radius:12px; padding:24px 16px;
  text-align:center; cursor:pointer; transition:all 0.2s;
}
.upload-zone:hover { border-color:var(--accent); background:var(--accent-l); }
.upload-zone p { font-size:12px; color:var(--muted); line-height:1.6; margin-top:8px; }
.upload-zone .uz-icon { font-size:28px; margin-bottom:4px; }
.upload-btn-sm {
  margin-top:10px; padding:7px 16px; border-radius:8px;
  background:var(--accent); color:#fff; border:none;
  font-size:12px; cursor:pointer; font-family:'Noto Sans SC',sans-serif;
}

/* Thumb grid */
.thumb-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
.thumb {
  aspect-ratio:1; border-radius:8px; overflow:hidden;
  background:var(--bg); position:relative; cursor:pointer;
  border:1px solid var(--border);
}
.thumb img { width:100%; height:100%; object-fit:cover; }
.thumb-icon { width:100%; height:100%; display:grid; place-items:center; font-size:20px; }
.thumb-del {
  position:absolute; top:3px; right:3px;
  width:18px; height:18px; border-radius:50%;
  background:rgba(220,38,38,0.85); color:#fff;
  border:none; font-size:10px; cursor:pointer;
  display:grid; place-items:center; opacity:0; transition:opacity 0.15s;
}
.thumb:hover .thumb-del { opacity:1; }

/* Project info */
.field { display:flex; flex-direction:column; gap:5px; }
.field label { font-size:11px; font-weight:600; color:var(--muted); }
.field input, .field textarea, .field select {
  padding:8px 11px; border:1px solid var(--border); border-radius:8px;
  font-size:13px; font-family:'Noto Sans SC',sans-serif; color:var(--text);
  outline:none; background:var(--white); transition:border-color 0.15s;
}
.field input:focus, .field textarea:focus, .field select:focus { border-color:var(--accent); }
.field textarea { resize:vertical; min-height:64px; }

.analyze-btn {
  width:100%; padding:13px; border-radius:12px;
  background:linear-gradient(135deg,var(--accent),#4f46e5);
  color:#fff; border:none; font-size:14px; font-weight:700;
  cursor:pointer; font-family:'Noto Sans SC',sans-serif;
  display:flex; align-items:center; justify-content:center; gap:8px;
  transition:opacity 0.2s, transform 0.15s; letter-spacing:0.3px;
}
.analyze-btn:hover { opacity:0.9; transform:translateY(-1px); }
.analyze-btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }

/* ── RIGHT MAIN ── */
.main { padding:28px 32px; display:flex; flex-direction:column; gap:24px; overflow-y:auto; }

/* Empty state */
.empty-state {
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:12px; color:var(--muted); padding:80px 20px;
}
.empty-state .e-icon { font-size:56px; opacity:0.35; }
.empty-state h3 { font-size:16px; font-weight:600; color:var(--text); opacity:0.5; }
.empty-state p { font-size:13px; text-align:center; line-height:1.7; max-width:320px; }

/* Progress */
.progress-card {
  background:var(--white); border:1px solid var(--border); border-radius:var(--r);
  padding:28px; display:flex; flex-direction:column; gap:16px;
}
.progress-title { font-family:'Syne',sans-serif; font-size:16px; font-weight:700; display:flex; align-items:center; gap:8px; }
.progress-steps { display:flex; flex-direction:column; gap:10px; }
.step { display:flex; align-items:center; gap:12px; }
.step-dot {
  width:28px; height:28px; border-radius:50%; flex-shrink:0;
  display:grid; place-items:center; font-size:12px;
  border:2px solid var(--border); color:var(--muted); background:var(--white);
  transition:all 0.3s;
}
.step-dot.done { background:var(--green); border-color:var(--green); color:#fff; }
.step-dot.active { background:var(--accent); border-color:var(--accent); color:#fff; animation:pulse-dot 1s infinite; }
@keyframes pulse-dot { 0%,100%{box-shadow:0 0 0 0 rgba(29,78,216,0.3)} 50%{box-shadow:0 0 0 6px rgba(29,78,216,0.0)} }
.step-label { font-size:13px; }
.step-label.active { color:var(--accent); font-weight:500; }
.step-label.done { color:var(--green); }
.prog-bar { height:6px; background:var(--border); border-radius:6px; overflow:hidden; }
.prog-fill { height:100%; background:linear-gradient(90deg,var(--accent),#4f46e5); border-radius:6px; transition:width 0.5s ease; width:0%; }

/* ── REPORT ── */
.report { display:flex; flex-direction:column; gap:20px; }

/* Summary cards */
.summary-row { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
.sum-card {
  background:var(--white); border:1px solid var(--border); border-radius:12px;
  padding:16px 18px; display:flex; flex-direction:column; gap:6px;
  transition:box-shadow 0.2s; animation:fadeUp 0.4s ease forwards; opacity:0;
}
.sum-card:hover { box-shadow:var(--shadow); }
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
.sum-card .num { font-family:'Syne',sans-serif; font-size:28px; font-weight:800; }
.sum-card .lbl { font-size:12px; color:var(--muted); }
.sum-card .trend { font-size:11px; margin-top:2px; }

/* Report grid */
.report-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.report-card {
  background:var(--white); border:1px solid var(--border); border-radius:var(--r);
  padding:20px 22px; animation:fadeUp 0.4s ease forwards; opacity:0;
}
.rc-title { font-family:'Syne',sans-serif; font-size:14px; font-weight:700; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
.rc-full { grid-column:1/-1; }

/* Bar chart */
.bar-chart { display:flex; flex-direction:column; gap:10px; }
.bar-row { display:flex; align-items:center; gap:10px; }
.bar-label { font-size:12px; width:90px; flex-shrink:0; text-align:right; color:var(--text); }
.bar-track { flex:1; height:10px; background:var(--bg); border-radius:10px; overflow:hidden; }
.bar-fill { height:100%; border-radius:10px; transition:width 0.8s cubic-bezier(0.4,0,0.2,1); width:0%; }
.bar-count { font-size:12px; color:var(--muted); width:28px; text-align:right; flex-shrink:0; }

/* Donut */
.donut-wrap { display:flex; align-items:center; gap:20px; }
.donut-svg { flex-shrink:0; }
.donut-legend { display:flex; flex-direction:column; gap:8px; flex:1; }
.legend-item { display:flex; align-items:center; gap:8px; font-size:12px; }
.legend-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }

/* Problem list */
.problem-list { display:flex; flex-direction:column; gap:8px; }
.problem-item {
  border:1px solid var(--border); border-radius:10px; padding:12px 14px;
  display:flex; gap:12px; align-items:flex-start;
  transition:border-color 0.15s, box-shadow 0.15s; cursor:pointer;
}
.problem-item:hover { border-color:#c5d0e0; box-shadow:var(--shadow); }
.pi-thumb {
  width:56px; height:56px; border-radius:8px; object-fit:cover; flex-shrink:0;
  background:var(--bg); display:grid; place-items:center; font-size:24px;
}
.pi-thumb img { width:56px; height:56px; border-radius:8px; object-fit:cover; }
.pi-body { flex:1; min-width:0; }
.pi-title { font-size:13px; font-weight:600; margin-bottom:3px; }
.pi-desc { font-size:12px; color:var(--muted); line-height:1.5; }
.pi-meta { display:flex; gap:6px; margin-top:6px; flex-wrap:wrap; }
.pi-tag { font-size:10px; padding:2px 7px; border-radius:5px; font-weight:500; }
.severity-badge { font-size:10px; padding:2px 8px; border-radius:20px; font-weight:600; }
.sev-high { background:var(--red-l); color:var(--red); }
.sev-mid { background:var(--orange-l); color:var(--orange); }
.sev-low { background:var(--green-l); color:var(--green); }

/* Text report */
.text-report {
  font-size:13px; line-height:1.9; color:var(--text);
  white-space:pre-wrap; font-weight:300;
}
.text-report strong { font-weight:600; }

/* Map placeholder */
.map-area {
  height:240px; background:linear-gradient(135deg,#e8f4e8,#ddeeff);
  border-radius:10px; position:relative; overflow:hidden;
  display:flex; align-items:center; justify-content:center;
}
.map-area svg { position:absolute; inset:0; width:100%; height:100%; }

/* Severity meter */
.severity-meter { display:flex; flex-direction:column; gap:12px; }
.sev-row { display:flex; align-items:center; gap:10px; }
.sev-label { font-size:12px; width:60px; flex-shrink:0; }
.sev-track { flex:1; height:8px; background:var(--bg); border-radius:8px; overflow:hidden; }
.sev-fill { height:100%; border-radius:8px; transition:width 0.8s ease; width:0%; }
.sev-num { font-size:12px; color:var(--muted); width:24px; text-align:right; }

/* Export bar */
.export-bar {
  background:var(--white); border:1px solid var(--border); border-radius:var(--r);
  padding:16px 22px; display:flex; align-items:center; gap:12px;
}
.export-bar p { font-size:13px; color:var(--muted); flex:1; }

/* Spinner */
.spin { display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,0.3); border-top-color:#fff; border-radius:50%; animation:sp .7s linear infinite; }
@keyframes sp { to{transform:rotate(360deg)} }

input[type=file] { display:none; }

@media(max-width:900px) {
  .layout { grid-template-columns:1fr; }
  .left { border-right:none; border-bottom:1px solid var(--border); }
  .summary-row { grid-template-columns:repeat(2,1fr); }
  .report-grid { grid-template-columns:1fr; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo">🏘 Neighbor<span>Mind</span></div>
    <div class="sep"></div>
    <div class="page-title">🔍 社区问题诊断 <span class="agent-tag">智能体 02</span></div>
  </div>
  <div class="topbar-right">
    <button class="btn btn-outline" onclick="resetAll()">↺ 重新分析</button>
    <button class="btn btn-green" id="exportBtn" style="display:none;" onclick="exportPDF()">📄 导出PDF报告</button>
  </div>
</div>

<div class="layout">

  <!-- LEFT -->
  <div class="left">

    <div class="panel-section">
      <div class="panel-label">上传现场素材</div>
      <div class="upload-zone" onclick="document.getElementById('imgInput').click()">
        <div class="uz-icon">📷</div>
        <p>点击上传照片<br>支持 JPG / PNG / HEIC</p>
        <button class="upload-btn-sm" onclick="event.stopPropagation();document.getElementById('imgInput').click()">选择照片</button>
      </div>
      <input type="file" id="imgInput" accept="image/*" multiple>
      <div class="thumb-grid" id="thumbGrid"></div>
    </div>

    <div class="panel-section">
      <div class="panel-label">项目信息</div>
      <div class="field">
        <label>社区名称</label>
        <input type="text" id="projName" placeholder="如：朝阳区某小区">
      </div>
      <div class="field">
        <label>调研日期</label>
        <input type="date" id="projDate">
      </div>
      <div class="field">
        <label>补充说明（选填）</label>
        <textarea id="projNote" placeholder="调研背景、特殊情况等…"></textarea>
      </div>
    </div>

    <button class="analyze-btn" id="analyzeBtn" onclick="startAnalysis()">
      🤖 开始 AI 诊断分析
    </button>

  </div>

  <!-- RIGHT -->
  <div class="main" id="mainArea">
    <div class="empty-state" id="emptyState">
      <div class="e-icon">🔍</div>
      <h3>等待素材上传</h3>
      <p>上传现场照片后点击「开始AI诊断分析」<br>系统将自动识别问题、生成可视化报告</p>
    </div>
  </div>

</div>

<script>
let uploadedFiles = [];
let analysisData = null;

// ── UPLOAD ──
document.getElementById('imgInput').addEventListener('change', e => {
  Array.from(e.target.files).forEach(f => {
    if (uploadedFiles.length >= 20) { alert('最多上传20张'); return; }
    uploadedFiles.push({ file: f, url: URL.createObjectURL(f) });
  });
  renderThumbs();
  e.target.value = '';
});

function renderThumbs() {
  const grid = document.getElementById('thumbGrid');
  grid.innerHTML = uploadedFiles.map((f, i) => `
    <div class="thumb">
      <img src="${f.url}" alt="">
      <button class="thumb-del" onclick="removeFile(${i})">✕</button>
    </div>
  `).join('');
}

function removeFile(i) {
  uploadedFiles.splice(i, 1);
  renderThumbs();
}

// Set today's date
document.getElementById('projDate').value = new Date().toISOString().slice(0,10);

// ── ANALYSIS ──
async function startAnalysis() {
  if (!uploadedFiles.length) { alert('请先上传至少一张照片'); return; }

  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spin"></div> 分析中…';

  showProgress();

  try {
    // Step 1: analyze each image
    updateStep(0);
    const results = await analyzeImages();
    updateStep(1);

    // Step 2: aggregate
    await delay(600);
    updateStep(2);
    analysisData = aggregateResults(results);
    await delay(400);
    saveToAgent03();

    // Step 3: generate text report
    updateStep(3);
    analysisData.report = await generateTextReport(analysisData);
    await delay(300);

    // Step 4: done
    updateStep(4);
    await delay(400);

    showReport(analysisData);
    document.getElementById('exportBtn').style.display = 'flex';

  } catch(e) {
    console.error(e);
    // Use demo data if API fails
    analysisData = getDemoData();
    analysisData.report = getDemoReport(analysisData);
    saveToAgent03();
    updateStep(4);
    await delay(300);
    showReport(analysisData);
    document.getElementById('exportBtn').style.display = 'flex';
  }

  btn.disabled = false;
  btn.innerHTML = '🤖 重新分析';
}

async function analyzeImages() {
  const results = [];
  for (let i = 0; i < uploadedFiles.length; i++) {
    updateProgress(10 + (i / uploadedFiles.length) * 50);
    try {
      const b64 = await toBase64(uploadedFiles[i].url);
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{ role: 'user', content: [
            { type: 'image', source: { type: 'base64', media_type: uploadedFiles[i].file.type || 'image/jpeg', data: b64 } },
            { type: 'text', text: `你是城市社区微更新专家。分析此现场照片，只返回JSON（无任何其他内容）：
{
  "category": "问题大类（停车交通/景观绿化/设施设备/公共空间/安全隐患/卫生整洁）",
  "tags": ["具体问题标签1","标签2"],
  "severity": "高/中/低",
  "desc": "一句话问题描述（15字以内）",
  "detail": "详细描述（30字以内）",
  "suggestion": "改造建议（20字以内）"
}` }
          ]}]
        })
      });
      const d = await res.json();
      const txt = d.content?.[0]?.text || '{}';
      const p = JSON.parse(txt.replace(/```json|```/g,'').trim());
      results.push({ ...p, url: uploadedFiles[i].url, idx: i });
    } catch(e) {
      // fallback
      results.push(getFallbackResult(i));
    }
  }
  return results;
}

function getFallbackResult(i) {
  const cats = ['停车交通','景观绿化','设施设备','公共空间','安全隐患','卫生整洁'];
  const tags = [['停车混乱','违规停车'],['绿化缺失','景观破旧'],['设施损坏','老旧设备'],['空间局促','缺乏活动场地'],['照明不足','安全隐患'],['垃圾堆积','卫生差']];
  const descs = ['停车管理混乱','绿化覆盖不足','公共设施破损','公共空间不足','照明安全隐患','环境卫生较差'];
  const details = ['小区停车位严重不足，存在违规占道停车现象','绿化带破损，植被稀少，景观效果差','健身器材等公共设施老旧损坏，存在安全隐患','缺乏足够的居民休闲活动空间','夜间照明不足，存在安全风险','垃圾分类设施不完善，环境卫生有待提升'];
  const sug = ['优化停车位布局','补植绿化、更新景观','更换损坏设施','增加活动场地','增设照明设施','完善垃圾分类系统'];
  const j = i % 6;
  return { category: cats[j], tags: tags[j], severity: ['高','中','低'][i%3], desc: descs[j], detail: details[j], suggestion: sug[j], url: uploadedFiles[i].url, idx: i };
}

function aggregateResults(results) {
  const catMap = {};
  const severityMap = { '高':0, '中':0, '低':0 };
  const allTags = [];

  results.forEach(r => {
    if (!catMap[r.category]) catMap[r.category] = { count:0, items:[], color:'', icon:'' };
    catMap[r.category].count++;
    catMap[r.category].items.push(r);
    severityMap[r.severity || '中']++;
    (r.tags||[]).forEach(t => allTags.push(t));
  });

  const CAT_CONFIG = {
    '停车交通': { color:'#f59e0b', icon:'🚗', bg:'#fffbeb' },
    '景观绿化': { color:'#10b981', icon:'🌿', bg:'#ecfdf5' },
    '设施设备': { color:'#ef4444', icon:'🔧', bg:'#fef2f2' },
    '公共空间': { color:'#8b5cf6', icon:'👥', bg:'#f5f3ff' },
    '安全隐患': { color:'#dc2626', icon:'⚠️', bg:'#fef2f2' },
    '卫生整洁': { color:'#0284c7', icon:'🗑️', bg:'#f0f9ff' },
  };
  Object.keys(catMap).forEach(k => {
    catMap[k].color = CAT_CONFIG[k]?.color || '#6b7280';
    catMap[k].icon = CAT_CONFIG[k]?.icon || '📌';
    catMap[k].bg = CAT_CONFIG[k]?.bg || '#f9fafb';
  });

  return {
    total: results.length,
    categories: catMap,
    severity: severityMap,
    tags: allTags,
    items: results,
    projName: document.getElementById('projName').value || '待命名社区',
    projDate: document.getElementById('projDate').value,
    note: document.getElementById('projNote').value,
  };
}

async function generateTextReport(data) {
  const summary = Object.entries(data.categories).map(([k,v]) => `${k}${v.count}处`).join('、');
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: `你是城市社区微更新规划师。根据以下社区调研数据，生成一份简洁的问题诊断报告（400字以内，分段落，使用**加粗**标注关键点）：

社区名称：${data.projName}
调研日期：${data.projDate}
照片数量：${data.total}张
问题汇总：${summary}
严重程度：高${data.severity['高']}处、中${data.severity['中']}处、低${data.severity['低']}处
补充说明：${data.note || '无'}

要求：先写总体评价，再分问题类型描述，最后写优先改造建议。语言专业但通俗。` }]
      })
    });
    const d = await res.json();
    return d.content?.[0]?.text || getDemoReport(data);
  } catch(e) {
    return getDemoReport(data);
  }
}

function getDemoReport(data) {
  const name = data.projName || '该社区';
  return `**总体评价**\n经过现场调研，${name}整体建设年代较早，公共空间品质有待提升。本次共采集照片${data.total}张，识别出${Object.keys(data.categories).length}大类问题，其中高严重度问题${data.severity['高']}处，需优先处理。\n\n**主要问题**\n${Object.entries(data.categories).map(([k,v]) => `• **${v.icon}${k}**：发现${v.count}处，${v.items[0]?.detail||'需进一步改善'}。`).join('\n')}\n\n**改造建议**\n建议按优先级分三期推进：近期优先解决高严重度安全问题；中期改善停车秩序和公共设施；远期系统提升景观品质和公共空间活力，打造宜居社区环境。`;

let curStep = -1;
function updateStep(i) {
  if (curStep >= 0) {
    document.getElementById(`sdot-${curStep}`)?.classList.replace('active','done');
    document.getElementById(`sdot-${curStep}`)?.textContent && (document.getElementById(`sdot-${curStep}`).textContent = '✓');

  document.getElementById(`sdot-${i}`)?.classList.add('active');
  document.getElementById(`slbl-${i}`)?.classList.add('active');
  updateProgress(10 + (i+1)/STEPS.length*90);

// ── DONUT SVG ──
function buildDonut(values, colors, size) {
  const total = values.reduce((a,b) => a+b, 0) || 1;
  const r = size/2 - 10, cx = size/2, cy = size/2;
  let angle = -Math.PI/2;
  const paths = values.map((v, i) => {
    const slice = (v / total) * 2 * Math.PI;
    const x1 = cx + r * Math.cos(angle);
    const y1 = cy + r * Math.sin(angle);
    angle += slice;
    const x2 = cx + r * Math.cos(angle);
    const y2 = cy + r * Math.sin(angle);
    const large = slice > Math.PI ? 1 : 0;
    return `<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} Z" fill="${colors[i]}" opacity="0.85"/>`;
  });
  return `<svg class="donut-svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    ${paths.join('')}
    <circle cx="${cx}" cy="${cy}" r="${r*0.55}" fill="white"/>
    <text x="${cx}" y="${cy+4}" text-anchor="middle" font-size="11" fill="#1a2235" font-weight="700" font-family="sans-serif">${total}</text>
  </svg>`;
}

}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

async function toBase64(url) {
  const blob = await (await fetch(url)).blob();
  return new Promise(res => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.readAsDataURL(blob);
  });
}
